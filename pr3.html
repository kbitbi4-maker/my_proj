<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Chat v026</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #e5ddd5; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { position: fixed; top: 0; width: 100%; height: 60px; background: #075e54; color: white; padding: 15px; display: flex; align-items: center; font-weight: bold; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #chat-box { flex: 1; overflow-y: auto; padding: 75px 15px 95px 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 85%; box-shadow: 0 1px 2px rgba(0,0,0,0.15); background: white; align-self: flex-start; }
        .msg.sent { align-self: flex-end; background: #dcf8c6; }
        .msg b { color: #075e54; font-size: 0.75rem; display: block; margin-bottom: 3px; }
        .msg p { margin: 0; font-size: 1rem; color: #333; word-wrap: break-word; line-height: 1.4; }
        .msg a { display: inline-block; padding: 10px 15px; background: #fff; border-radius: 10px; color: #075e54; font-weight: bold; text-decoration: none; margin-top: 5px; border: 1px solid #075e54; }
        .msg span { font-size: 0.65rem; color: #888; display: block; text-align: right; margin-top: 5px; }
        .input-area { position: fixed; bottom: 0; width: 100%; height: 80px; padding: 12px; background: #f0f0f0; display: flex; gap: 8px; align-items: center; border-top: 1px solid #ddd; z-index: 100; }
        #user-name { width: 75px; padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        #msg-text { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        .btn-send { background: #075e54; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .btn-attach { background: #555; color: white; border: none; border-radius: 50%; width: 42px; height: 42px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        #status-bar { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 8px 15px; border-radius: 20px; font-size: 0.8rem; display: none; z-index: 200; }
    </style>
</head>
<body>

<div class="header"><span>Global Chat v026</span></div>
<div id="chat-box">Загрузка...</div>
<div id="status-bar">⏳ Отправка фото...</div>

<div class="input-area">
    <input type="text" id="user-name" placeholder="Имя" maxlength="12">
    <input type="file" id="file-input" accept="image/*" style="display:none" onchange="processFile(this)">
    <button class="btn-attach" onclick="document.getElementById('file-input').click()">📎</button>
    <input type="text" id="msg-text" placeholder="Текст..." autocomplete="off">
    <button class="btn-send" onclick="send()">➤</button>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyP1bElVZEVzu91dsqSGKsLgP0EipATMMZ1a2c2KcaxZR9so5eWazIFg0Fle7YgKHQ/exec'; // <-- ВСТАВЬТЕ ССЫЛКУ ИЗ GOOGLE SCRIPTS

    const chatBox = document.getElementById('chat-box');
    const msgInput = document.getElementById('msg-text');
    const nameInput = document.getElementById('user-name');
    const statusBar = document.getElementById('status-bar');

    window.onload = () => {
        const savedName = localStorage.getItem('chat_user_name');
        if (savedName) nameInput.value = savedName;
        loadMessages();
        setInterval(loadMessages, 8000);
    };

    async function loadMessages() {
        try {
            const res = await fetch(SCRIPT_URL + '?t=' + Date.now());
            const data = await res.json();
            const currentName = (nameInput.value || "").trim().toLowerCase();

            chatBox.innerHTML = data.map(row => {
                if (!row || row.length < 2) return '';
                const [sender, text, time] = row;
                const isMe = currentName && sender.toLowerCase() === currentName;
                
                let contentHTML = "";
                if (String(text).startsWith("http")) {
                    // Добавлен rel="noopener noreferrer" для предотвращения открытия приложения
                    contentHTML = `<p><a href="${text}" target="_blank" rel="noopener noreferrer">🖼 Открыть фото</a></p>`;
                } else {
                    contentHTML = `<p>${text}</p>`;
                }

                return `<div class="msg ${isMe ? 'sent' : ''}">
                            ${!isMe ? `<b>${sender}</b>` : ''}
                            ${contentHTML}
                            <span>${time}</span>
                        </div>`;
            }).join('');
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch (e) { console.log("Refresh error"); }
    }

    async function processFile(input) {
        if (!input.files[0]) return;
        statusBar.style.display = 'block';
        const reader = new FileReader();
        reader.readAsDataURL(input.files[0]);
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let w = img.width, h = img.height, max = 1000;
                if (w > h && w > max) { h *= max/w; w = max; } else if (h > max) { w *= max/h; h = max; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                send(canvas.toDataURL('image/jpeg', 0.7), true);
            };
        };
        input.value = '';
    }

    async function send(data = null, isFile = false) {
        const user = nameInput.value.trim() || 'Guest';
        const text = isFile ? "[GD_IMG]" : msgInput.value.trim();
        if (!text && !data) return;
        if (!isFile) msgInput.value = '';
        localStorage.setItem('chat_user_name', user);

        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ user, text, file: data }) });
            setTimeout(() => { statusBar.style.display = 'none'; loadMessages(); }, 2500);
        } catch (e) { 
            statusBar.style.display = 'none';
        }
    }

    msgInput.addEventListener("keypress", (e) => { if (e.key === "Enter") send(); });
</script>
</body>
</html>
