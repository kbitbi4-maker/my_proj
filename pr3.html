<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мини-Чат</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #e5ddd5; display: flex; flex-direction: column; height: 100vh; }
        
        /* Шапка */
        .header { background: #075e54; color: white; padding: 15px; display: flex; align-items: center; gap: 10px; }
        .back-btn { text-decoration: none; color: white; font-size: 1.2rem; }

        /* Окно сообщений */
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px; border-radius: 10px; font-size: 0.9rem; line-height: 1.4; position: relative; }
        .msg.sent { align-self: flex-end; background: #dcf8c6; border: 1px solid #ccedaf; }
        .msg.time { font-size: 0.7rem; color: #888; margin-top: 5px; text-align: right; }

        /* Поле ввода */
        .input-area { background: #f0f0f0; padding: 10px; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: none; border-radius: 20px; outline: none; }
        button { background: #075e54; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html" class="back-btn">⬅</a>
    <span>Общий чат (Демо)</span>
</div>

<div id="chat-window">
    <div class="msg sent">Привет! Это тестовое сообщение. Пиши что-нибудь!<div class="msg time">12:00</div></div>
</div>

<div class="input-area">
    <input type="text" id="message-input" placeholder="Введите сообщение...">
    <button onclick="sendMessage()">➤</button>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const input = document.getElementById('message-input');

    // Загрузка истории из памяти телефона
    window.onload = () => {
        const history = JSON.parse(localStorage.getItem('chat_history') || '[]');
        history.forEach(m => appendMessage(m.text, m.time));
    };

    function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        appendMessage(text, time);
        saveMessage(text, time);
        
        input.value = '';
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function appendMessage(text, time) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'msg sent';
        msgDiv.innerHTML = `${text}<div class="msg time">${time}</div>`;
        chatWindow.appendChild(msgDiv);
    }

    function saveMessage(text, time) {
        const history = JSON.parse(localStorage.getItem('chat_history') || '[]');
        history.push({text, time});
        localStorage.setItem('chat_history', JSON.stringify(history));
    }

    // Отправка по нажатию Enter
    input.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
</script>

</body>
</html>
