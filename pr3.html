<!-- pr3.html ver011 -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat v011</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #e5ddd5; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { position: fixed; top: 0; width: 100%; height: 60px; background: #075e54; color: white; padding: 0 15px; display: flex; align-items: center; gap: 15px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 1000; }
        .back-btn { text-decoration: none; color: white; font-size: 1.5rem; line-height: 1; }
        #chat-box { flex: 1; overflow-y: auto; padding: 75px 15px 85px 15px; display: flex; flex-direction: column; gap: 8px; -webkit-overflow-scrolling: touch; }
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 85%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); font-size: 0.95rem; }
        .msg.received { align-self: flex-start; background: white; }
        .msg.sent { align-self: flex-end; background: #dcf8c6; }
        .msg b { color: #075e54; font-size: 0.75rem; display: block; margin-bottom: 2px; }
        .msg span { font-size: 0.65rem; color: #888; display: block; text-align: right; margin-top: 4px; }
        .input-area { position: fixed; bottom: 0; width: 100%; height: 70px; background: #f0f0f0; padding: 10px; display: flex; gap: 8px; align-items: center; border-top: 1px solid #ddd; z-index: 1000; }
        #user-name { width: 75px; flex: none; padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; background: #fff; font-size: 0.9rem; }
        #msg-text { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; background: #fff; font-size: 1rem; }
        button { background: #075e54; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex: none; }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html" class="back-btn">‹</a>
    <span>Global Chat v011</span>
</div>

<div id="chat-box">Loading messages...</div>

<div class="input-area">
    <input type="text" id="user-name" placeholder="Name" maxlength="12">
    <input type="text" id="msg-text" placeholder="Message..." autocomplete="off">
    <button onclick="send()">➤</button>
</div>

<!-- Ссылка на короткий звук сообщения -->
<audio id="notif-audio" src="https://assets.mixkit.co" preload="auto"></audio>

<script>
    const SCRIPT_URL = 'https://script.google.com';
    const chatBox = document.getElementById('chat-box');
    const nameInput = document.getElementById('user-name');
    const msgInput = document.getElementById('msg-text');
    const audio = document.getElementById('notif-audio');
    
    let lastCount = -1;

    window.onload = () => {
        const savedName = localStorage.getItem('chat_user_name');
        if (savedName) nameInput.value = savedName;
        loadMessages();
    };

    nameInput.oninput = () => localStorage.setItem('chat_user_name', nameInput.value);

    async function loadMessages() {
        try {
            const res = await fetch(SCRIPT_URL + '?t=' + Date.now());
            const data = await res.json();
            const currentName = nameInput.value.trim().toLowerCase();

            if (!Array.isArray(data)) return;

            // Звук при новых сообщениях (не от себя)
            if (lastCount !== -1 && data.length > lastCount) {
                const lastRow = data[data.length - 1];
                if (String(lastRow || '').toLowerCase() !== currentName) {
                    audio.play().catch(() => {}); 
                }
            }
            lastCount = data.length;

            chatBox.innerHTML = data.map(row => {
                const name = String(row || 'Guest');
                const isMe = (name.toLowerCase() === currentName && currentName !== "");
                return `
                    <div class="msg ${isMe ? 'sent' : 'received'}">
                        ${!isMe ? `<b>${name}</b>` : ''}
                        <p>${row || ''}</p>
                        <span>${row || ''}</span>
                    </div>
                `;
            }).join('');
            
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch (e) { 
            console.log("Sync..."); 
        }
    }

    async function send() {
        const user = nameInput.value.trim() || 'Guest';
        const text = msgInput.value.trim();
        if (!text) return;

        msgInput.value = '';
        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ user, text }) });
            // Первый клик по кнопке "отправить" дает сайту право играть звуки
            audio.play().then(() => audio.pause()).catch(() => {});
            setTimeout(loadMessages, 1200);
        } catch (e) { }
    }

    msgInput.onkeypress = (e) => { if (e.key === "Enter") send(); };
    setInterval(loadMessages, 5000);
</script>
</body>
</html>
