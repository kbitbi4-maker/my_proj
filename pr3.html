<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Chat v005</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            /* ФОНОВЫЙ УЗОР (ver005) */
            background-color: #e5ddd5;
            background-image: url("data:image/svg+xml,%3Csvg xmlns='http://www.w3.org' width='80' height='80' viewBox='0 0 80 80'%3E%3Cg fill='%23919191' fill-opacity='0.1'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' /%3E%3C/g%3E%3C/svg%3E");
            display: flex; flex-direction: column; 
            height: 100vh; overflow: hidden; 
        }
        
        .header { 
            position: fixed; top: 0; width: 100%; height: 60px;
            background: #075e54; color: white; padding: 15px; 
            display: flex; align-items: center; gap: 15px; 
            font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 100;
        }
        .back-btn { text-decoration: none; color: white; font-size: 1.5rem; line-height: 1; }
        
        #chat-box { 
            flex: 1; overflow-y: auto; 
            padding: 75px 15px 85px 15px; 
            display: flex; flex-direction: column; gap: 10px; 
        }
        
        /* Сообщения */
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 85%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); align-self: flex-start; background: white; }
        .msg.sent { align-self: flex-end; background: #dcf8c6; }

        .msg b { color: #075e54; font-size: 0.75rem; display: block; margin-bottom: 2px; }
        .msg p { margin: 0; font-size: 0.95rem; color: #333; line-height: 1.4; word-wrap: break-word; }
        .msg span { font-size: 0.65rem; color: #888; display: block; text-align: right; margin-top: 4px; }

        .input-area { 
            position: fixed; bottom: 0; width: 100%; height: 75px;
            padding: 12px; background: #f0f0f0; display: flex; 
            gap: 8px; align-items: center; border-top: 1px solid #ddd; z-index: 100;
        }
        #user-name { width: 70px; flex: none; padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; font-size: 0.9rem; background: #fff; }
        #msg-text { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; font-size: 1rem; background: #fff; }
        button { background: #075e54; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html" class="back-btn">‹</a>
    <span>Global Chat</span>
</div>

<div id="chat-box">Loading...</div>

<div class="input-area">
    <input type="text" id="user-name" placeholder="Name" maxlength="15">
    <input type="text" id="msg-text" placeholder="Type a message..." autocomplete="off">
    <button onclick="send()">➤</button>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com';
    const chatBox = document.getElementById('chat-box');
    const msgInput = document.getElementById('msg-text');
    const nameInput = document.getElementById('user-name');

    window.onload = () => {
        const savedName = localStorage.getItem('chat_user_name');
        if (savedName) nameInput.value = savedName;
        loadMessages();
    };
    nameInput.oninput = () => localStorage.setItem('chat_user_name', nameInput.value);

    async function loadMessages() {
        try {
            const res = await fetch(SCRIPT_URL + '?t=' + Date.now());
            const data = await res.json();
            
            if (!data || data.length === 0) {
                chatBox.innerHTML = "<p style='text-align:center; color:#888;'>No messages yet</p>";
                return;
            }

            const currentUserName = nameInput.value.trim();

            chatBox.innerHTML = data.map(row => {
                const isMe = (row[0] === currentUserName && currentUserName !== "");
                return `
                    <div class="msg ${isMe ? 'sent' : ''}">
                        ${!isMe ? `<b>${row[0] || 'Guest'}</b>` : ''}
                        <p>${row[1] || ''}</p>
                        <span>${row[2] || ''}</span>
                    </div>
                `;
            }).join('');
            
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch (e) { 
            console.error("Load error:", e);
        }
    }

    async function send() {
        const user = nameInput.value.trim() || 'Guest';
        const text = msgInput.value.trim();
        if (!text) return;
        msgInput.value = '';
        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ user, text })
            });
            setTimeout(loadMessages, 1200);
        } catch (e) { console.error("Send error:", e); }
    }

    msgInput.addEventListener("keypress", (e) => { if (e.key === "Enter") send(); });
    setInterval(loadMessages, 5000);
    loadMessages();
</script>

</body>
</html>
