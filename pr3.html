<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>pr3 Chat v005</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-image: url('fon.jpg'); background-size: cover; background-position: center; background-attachment: fixed; background-repeat: no-repeat; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { position: fixed; top: 0; width: 100%; height: 60px; background: #075e54; color: white; padding: 15px; display: flex; align-items: center; font-weight: bold; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        /* Кнопка удаления в шапке */
        #delete-btn { display: none; margin-left: auto; background: #ff5252; color: white; border: none; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 75px 15px 95px 15px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; background: transparent; }
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 90%; box-shadow: 0 1px 2px rgba(0,0,0,0.15); background: white; align-self: flex-start; animation: fadeIn 0.3s ease; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
        
        /* Эффект выделения сообщения */
        .msg.selected { background-color: #e1f5fe !important; border: 2px solid #03a9f4; transform: scale(1.02); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg.sent { align-self: flex-end; background: #dcf8c6; }
        .msg-info { font-size: 0.7rem; color: #888; display: block; margin-bottom: 5px; border-bottom: 1px solid #f0f0f0; padding-bottom: 2px; pointer-events: none; }
        .msg-info b { color: #075e54; }
        .photo-container { display: flex; flex-direction: column; gap: 8px; margin-top: 5px; align-items: center; pointer-events: none; }
        .thumb-preview { width: 300px; height: 300px; border-radius: 12px; border: 1px solid #ccc; object-fit: cover; background: #eee; }
        .msg a { display: block; text-align: center; width: 300px; padding: 12px; background: #fff; border-radius: 10px; color: #075e54; font-weight: bold; text-decoration: none; border: 1px solid #075e54; font-size: 0.95rem; pointer-events: auto; }
        .input-area { position: fixed; bottom: 0; width: 100%; height: 80px; padding: 12px; background: #f0f0f0; display: flex; gap: 8px; align-items: center; border-top: 1px solid #ddd; z-index: 100; }
        #user-name { width: 75px; padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        #msg-text { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        .btn-send { background: #075e54; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .btn-attach { background: transparent; color: #555; border: none; border-radius: 50%; width: 42px; height: 42px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        #status-bar { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 8px 15px; border-radius: 20px; font-size: 0.8rem; display: none; z-index: 200; }
    </style>
</head>
<body>
    <div class="header">
        <span>pr3 Chat v005</span>
        <button id="delete-btn" onclick="deleteSelected()">🗑 Удалить</button>
    </div>
    <div id="chat-box">Загрузка...</div>
    <div id="status-bar">⏳ Действие...</div>
    <div class="input-area">
        <input type="text" id="user-name" placeholder="Имя" maxlength="12">
        <input type="file" id="file-input" accept="image/*" multiple style="display:none" onchange="processFile(this)">
        <button class="btn-attach" onclick="document.getElementById('file-input').click()">📎</button>
        <input type="text" id="msg-text" placeholder="Текст..." autocomplete="off">
        <button class="btn-send" onclick="send()">➤</button>
    </div>
<script>
    const BASE_URL = 'https://script.google.com/macros/s/AKfycbyP1bElVZEVzu91dsqSGKsLgP0EipATMMZ1a2c2KcaxZR9so5eWazIFg0Fle7YgKHQ/exec'; 
    const SCRIPT_URL = BASE_URL; 
    const chatBox = document.getElementById('chat-box');
    const msgInput = document.getElementById('msg-text');
    const nameInput = document.getElementById('user-name');
    const statusBar = document.getElementById('status-bar');
    const deleteBtn = document.getElementById('delete-btn');
    
    let lastCount = 0, forceScroll = false;
    let selectedMsgData = null;

    window.onload = () => {
        const savedName = localStorage.getItem('chat_user_name');
        if (savedName) nameInput.value = savedName;
        loadMessages(true);
        setInterval(() => loadMessages(false), 1000); 
    };

    async function loadMessages(initial = false) {
        try {
            const res = await fetch(SCRIPT_URL + '?t=' + Date.now());
            const data = await res.json();
            if (data.length === lastCount && !initial) return;
            
            const currentName = (nameInput.value || "").trim().toLowerCase();
            const isAtBottom = chatBox.scrollHeight - chatBox.clientHeight <= chatBox.scrollTop + 100;
            
            if (initial || data.length < lastCount) { 
                chatBox.innerHTML = ''; 
                lastCount = 0; 
                selectedMsgData = null;
                deleteBtn.style.display = 'none';
            }
            
            const newMessages = data.slice(lastCount);
            newMessages.forEach(row => {
                if (!row || row.length < 2) return;
                const [sender, text, dateTime, thumb] = row;
                const isMe = currentName && sender.toLowerCase() === currentName;
                
                let contentHTML = String(text).startsWith("http") 
                    ? `<div class="photo-container">${thumb ? `<img src="${thumb}" class="thumb-preview">` : ''}<a href="${text}" target="_blank">🖼 Открыть фото</a></div>` 
                    : `<p>${text}</p>`;
                
                const msgDiv = document.createElement('div');
                msgDiv.className = `msg ${isMe ? 'sent' : ''}`;
                msgDiv.innerHTML = `<span class="msg-info">${!isMe ? `<b>${sender}</b> | ` : ''}${dateTime}</span>${contentHTML}`;
                
                // Клик для выделения (удаления)
                msgDiv.onclick = () => {
                    const activeUser = nameInput.value.trim();
                    if (activeUser === "admin" || sender === activeUser) {
                        if (selectedMsgData && selectedMsgData.el === msgDiv) {
                            msgDiv.classList.remove('selected');
                            selectedMsgData = null;
                            deleteBtn.style.display = 'none';
                        } else {
                            if (selectedMsgData) selectedMsgData.el.classList.remove('selected');
                            msgDiv.classList.add('selected');
                            selectedMsgData = { el: msgDiv, dateTime: dateTime, user: sender };
                            deleteBtn.style.display = 'block';
                        }
                    }
                };
                
                chatBox.appendChild(msgDiv);
            });
            
            lastCount = data.length;
            if (initial || isAtBottom || forceScroll) { chatBox.scrollTop = chatBox.scrollHeight; forceScroll = false; }
        } catch (e) { }
    }

    async function processFile(input) {
        if (!input.files || input.files.length === 0) return;
        const files = Array.from(input.files);
        statusBar.style.display = 'block';
        for (let i = 0; i < files.length; i++) {
            statusBar.innerText = `⏳ Обработка ${i + 1}/${files.length}`;
            await new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(files[i]);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = async () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height, max = 1000;
                        if (w > h && w > max) { h *= max/w; w = max; } else if (h > max) { w *= max/h; h = max; }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        const mainData = canvas.toDataURL('image/jpeg', 0.7);
                        const tCanvas = document.createElement('canvas');
                        tCanvas.width = 300; tCanvas.height = 300;
                        const tCtx = tCanvas.getContext('2d');
                        let ratio = Math.max(300 / img.width, 300 / img.height);
                        let nw = img.width * ratio, nh = img.height * ratio;
                        let cx = (300 - nw) / 2, cy = (300 - nh) / 2;
                        tCtx.drawImage(img, cx, cy, nw, nh);
                        const thumbData = tCanvas.toDataURL('image/jpeg', 0.5);
                        await send(mainData, true, thumbData);
                        resolve();
                    };
                };
            });
        }
        statusBar.style.display = 'none';
        input.value = '';
        forceScroll = true;
        loadMessages();
    }

    async function send(data = null, isFile = false, thumbData = "") {
        const user = nameInput.value.trim() || 'Guest';
        const text = isFile ? "[GD_IMG]" : msgInput.value.trim();
        if (!text && !data) return;
        if (!isFile) localStorage.setItem('chat_user_name', user);

        const payload = { user, text, file: data, thumb: thumbData };
        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
            if (!isFile) msgInput.value = '';
            forceScroll = true;
            setTimeout(() => loadMessages(), 500);
        } catch (e) {}
    }

    async function deleteSelected() {
        if (!selectedMsgData) return;
        if (!confirm("Удалить это сообщение?")) return;

        const payload = {
            action: "delete",
            user: nameInput.value.trim(),
            dateTime: selectedMsgData.dateTime
        };

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
            deleteBtn.style.display = 'none';
            selectedMsgData.el.remove();
            selectedMsgData = null;
            setTimeout(() => loadMessages(true), 1000);
        } catch (e) {
            alert("Ошибка связи с сервером");
        }
    }
</script>
</body>
</html>
