<!-- pr3.html ver010 -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Chat v010</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #e5ddd5; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { position: fixed; top: 0; width: 100%; height: 60px; background: #075e54; color: white; padding: 15px; display: flex; align-items: center; gap: 15px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 100; }
        .back-btn { text-decoration: none; color: white; font-size: 1.5rem; line-height: 1; }
        #chat-box { flex: 1; overflow-y: auto; padding: 75px 15px 85px 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 85%; box-shadow: 0 1px 2px rgba(0,0,0,0.15); position: relative; }
        .msg.received { align-self: flex-start; background: white; border-top-left-radius: 2px; }
        .msg.sent { align-self: flex-end; background: #dcf8c6; border-top-right-radius: 2px; }
        .msg b { color: #075e54; font-size: 0.75rem; display: block; margin-bottom: 3px; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .msg p { margin: 0; font-size: 1rem; color: #333; line-height: 1.4; word-wrap: break-word; }
        .msg span { font-size: 0.65rem; color: #888; display: block; text-align: right; margin-top: 5px; }
        .input-area { position: fixed; bottom: 0; width: 100%; height: 75px; padding: 12px; background: #f0f0f0; display: flex; gap: 8px; align-items: center; border-top: 1px solid #ddd; z-index: 100; }
        #user-name { width: 70px; flex: none; padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; font-size: 0.9rem; background: #fff; }
        #msg-text { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ccc; outline: none; font-size: 1rem; background: #fff; }
        button { background: #075e54; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        /* Кнопка активации звука (нужна по правилам браузеров) */
        #notif-banner { position: fixed; top: 65px; left: 10px; right: 10px; background: #fff; padding: 10px; border-radius: 8px; z-index: 2000; box-shadow: 0 4px 10px rgba(0,0,0,0.2); font-size: 0.8rem; text-align: center; display: none; }
    </style>
</head>
<body>

<div id="notif-banner">
    Click here to enable 🔊 sound and 🔔 notifications
    <button onclick="enableNotifications()" style="width: auto; height: auto; border-radius: 5px; padding: 5px 10px; margin-left: 10px; display: inline-block;">Enable</button>
</div>

<div class="header">
    <a href="index.html" class="back-btn">‹</a>
    <span>Global Chat v010</span>
</div>

<div id="chat-box">Loading...</div>

<div class="input-area">
    <input type="text" id="user-name" placeholder="Name" maxlength="15">
    <input type="text" id="msg-text" placeholder="Type a message..." autocomplete="off">
    <button onclick="send()">➤</button>
</div>

<!-- Стандартный звук уведомления (короткий "блик") -->
<audio id="notif-sound" src="https://assets.mixkit.co" preload="auto"></audio>

<script>
    const SCRIPT_URL = 'https://script.google.com';
    const chatBox = document.getElementById('chat-box');
    const msgInput = document.getElementById('msg-text');
    const nameInput = document.getElementById('user-name');
    const audio = document.getElementById('notif-sound');
    let lastMessageCount = -1;

    window.onload = () => {
        const savedName = localStorage.getItem('chat_user_name');
        if (savedName) nameInput.value = savedName;
        
        // Показываем баннер, если уведомления не разрешены
        if (Notification.permission !== "granted") {
            document.getElementById('notif-banner').style.display = 'block';
        }
        loadMessages();
    };

    function enableNotifications() {
        Notification.requestPermission().then(perm => {
            if (perm === "granted") {
                audio.play().then(() => audio.pause()); // Прогрев аудио
                document.getElementById('notif-banner').style.display = 'none';
            }
        });
    }

    async function loadMessages() {
        try {
            const res = await fetch(SCRIPT_URL + '?t=' + Date.now());
            const data = await res.json();
            const currentName = nameInput.value.trim().toLowerCase();

            if (data.length > 0) {
                // Если пришли НОВЫЕ сообщения и это не первая загрузка
                if (lastMessageCount !== -1 && data.length > lastMessageCount) {
                    const lastMsg = data[data.length - 1];
                    const senderName = String(lastMsg[0] || '').toLowerCase();
                    
                    // Если автор последнего сообщения НЕ я - сигналим
                    if (senderName !== currentName) {
                        audio.play().catch(() => {}); // Звук
                        if (Notification.permission === "granted") {
                            new Notification("New message from " + lastMsg[0], { body: lastMsg[1] }); // Пуш
                        }
                    }
                }
                lastMessageCount = data.length;

                chatBox.innerHTML = data.map(row => {
                    const name = String(row[0] || 'Guest');
                    const isMe = (name.toLowerCase() === currentName && currentName !== "");
                    return `
                        <div class="msg ${isMe ? 'sent' : 'received'}">
                            ${!isMe ? `<b>${name}</b>` : ''}
                            <p>${row[1] || ''}</p>
                            <span>${row[2] || ''}</span>
                        </div>
                    `;
                }).join('');
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        } catch (e) { console.error(e); }
    }

    async function send() {
        const user = nameInput.value.trim() || 'Guest';
        const text = msgInput.value.trim();
        if (!text) return;
        msgInput.value = '';
        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ user, text }) });
            setTimeout(loadMessages, 1200);
        } catch (e) { }
    }

    nameInput.oninput = () => localStorage.setItem('chat_user_name', nameInput.value);
    msgInput.addEventListener("keypress", (e) => { if (e.key === "Enter") send(); });
    setInterval(loadMessages, 5000);
</script>
</body>
</html>
