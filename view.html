<script>
    const PUB_ID = '1vTiR2Js852Kp4gQ3QKDFJdWiBtwDXH2ftdH0oT5Jh1opdTxti28mlNvBD4sIbXb_5bkQua6YsnANT6M';
    const urlParams = new URLSearchParams(window.location.search);
    const sheetName = urlParams.get('sheet') || 'Лист1';
    document.getElementById('title').innerText = "Набор: " + sheetName;

    const url = `https://docs.google.com{PUB_ID}/pub?output=csv&sheet=${encodeURIComponent(sheetName)}`;

    fetch(url)
        .then(res => {
            if (!res.ok) throw new Error('Сетевая ошибка');
            return res.text();
        })
        .then(csv => {
            const rows = csv.split(/\r?\n/).map(row => {
                // Улучшенный парсинг CSV (учитывает запятые внутри кавычек)
                return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/^"|"$/g, '').trim());
            });

            if (rows.length === 0 || (rows.length === 1 && rows[0][0] === "")) {
                document.getElementById('content').innerHTML = "Данные не найдены. Проверьте название листа (должно быть Лист1).";
                return;
            }

            let html = '<table><thead><tr>';
            // Заголовки
            rows[0].forEach(cell => html += `<th>${cell}</th>`);
            html += '</tr></thead><tbody>';

            // Строки данных
            for (let i = 1; i < rows.length; i++) {
                if (rows[i].some(cell => cell !== "")) { // Пропускаем совсем пустые строки
                    html += '<tr>' + rows[i].map(cell => `<td>${cell}</td>`).join('') + '</tr>';
                }
            }
            document.getElementById('content').innerHTML = html + '</tbody></table>';
        })
        .catch(err => {
            document.getElementById('content').innerHTML = "Ошибка загрузки. Убедитесь, что таблица опубликована (Файл -> Поделиться -> Опубликовать).";
            console.error(err);
        });
</script>
