<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Просмотр таблицы</title>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #f4f7f6; }
        .nav-menu { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .btn { padding: 10px 15px; color: white; border-radius: 6px; text-decoration: none; font-size: 0.9rem; border: none; background: #4285f4; cursor: pointer; }
        .btn-green { background: #34a853; }
        .table-container { overflow-x: auto; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: #4285f4; color: white; }
        tr:nth-child(even) { background: #fafafa; }
    </style>
</head>
<body>

    <div class="nav-menu">
        <a href="index.html" class="btn btn-green">Главное меню</a>
        <a href="pr1.html" class="btn">Назад</a>
    </div>

    <h2 id="title" style="text-align:center;">Загрузка...</h2>
    <div class="table-container" id="content"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const sheetName = urlParams.get('sheet') || 'Лист1';
        document.getElementById('title').innerText = "Набор: " + sheetName;

        // Загружаем локальный файл базы данных
        fetch('database.json')
            .then(response => response.json())
            .then(data => {
                const tableData = data[sheetName];
                if (!tableData) {
                    document.getElementById('content').innerHTML = "<p style='padding:20px;'>Набор не найден в базе данных.</p>";
                    return;
                }

                let html = '<table><thead><tr>';
                // Заголовки (первая строка массива)
                tableData[0].forEach(cell => html += `<th>${cell}</th>`);
                html += '</tr></thead><tbody>';

                // Данные (остальные строки)
                for (let i = 1; i < tableData.length; i++) {
                    html += '<tr>' + tableData[i].map(cell => `<td>${cell}</td>`).join('') + '</tr>';
                }
                
                document.getElementById('content').innerHTML = html + '</tbody></table>';
            })
            .catch(err => {
                document.getElementById('content').innerHTML = "Ошибка загрузки базы данных.";
                console.error(err);
            });
    </script>
</body>
</html>
