<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проект PR2</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        #text-container { margin: 20px auto; padding: 20px; border: 1px solid #ddd; border-radius: 10px; max-width: 600px; }
        .btn-group { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        button, .nav-btn { padding: 12px 20px; font-size: 1rem; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; }
        .color-btn { background: #4285f4; color: white; }
        .nav-btn { background: #34a853; color: white; }
    </style>
</head>
<body>

    <div class="btn-group">
        <button class="color-btn" onclick="changeColor()">Сменить цвет текста</button>
        <a href="index.html" class="nav-btn">Главное меню</a>
    </div>

    <div id="text-container">
        <h2>The Future of Strategy Gaming</h2>
        <p>Strategy games have come a long way from simple board games to complex digital simulations...</p>
    </div>

    <script>
        function changeColor() {
            const container = document.getElementById('text-container');
            const colors = ['#FF5733', '#33FF57', '#3357FF', '#F333FF', '#000000'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            container.style.color = randomColor;
        }
    </script>
</body>
</html>
