<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  <title>QR_012</title>
<style>
    html, body { height: 100%; margin: 0; padding: 0; font-family: sans-serif; overscroll-behavior-y: none; touch-action: pan-x pan-y; }
    body { display: flex; flex-direction: column; background: url('fon_s.jpg') no-repeat center center fixed; background-size: cover; }
    /* Шапка: 60px + 25% = 75px */
    .header { display: flex; align-items: center; padding: 12px 18px; background: #3f51b5; color: white; position: sticky; top: 0; z-index: 1000; height: 75px; box-sizing: border-box; gap: 12px; }
    /* Шрифт: 1.1rem + 25% ≈ 1.4rem */
    .header h2 { margin: 0; font-size: 1.4rem; flex-grow: 1; text-align: center; display: flex; align-items: center; justify-content: center; gap: 10px; }
    /* Индикатор: 12px + 25% = 15px */
    .net-indicator { width: 15px; height: 15px; border-radius: 50%; background: #ff4b2b; border: 2.5px solid white; transition: 0.3s; flex-shrink: 0; }
    .net-online { background: #00e676; box-shadow: 0 0 10px #00e676; }
    /* Иконки: 1.5rem + 25% ≈ 1.9rem */
    .btn-icon { background: transparent; border: none; color: white; font-size: 1.9rem; cursor: pointer; padding: 6px; display: flex; align-items: center; }
    /* Кнопка камеры: 0.75rem + 25% ≈ 0.95rem */
    #start-camera { font-size: 0.95rem; border: 1.25px solid white; border-radius: 8px; padding: 8px 12px; text-transform: uppercase; font-weight: bold; background: transparent; color: white; cursor: pointer; }
    #start-camera:disabled { opacity: 0.5; }
    .content { padding: 25px; display: flex; flex-direction: column; align-items: center; flex-grow: 1; overflow-y: auto; background: transparent; width: 100%; box-sizing: border-box; }
    /* Окно камеры: 400x300 + 25% = 500x375 */
    .camera-preview { width: 100%; max-width: 500px; height: 375px; background: #000; border-radius: 15px; overflow: hidden; position: relative; margin-bottom: 18px; border: 2.5px solid #ccc; flex-shrink: 0; }
    video { width: 100%; height: 100%; object-fit: cover; }
    #result { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 12px; }
    .log-title { color: white; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); font-size: 1.4rem; margin-bottom: 6px; width: 100%; }
    /* Текст логов: 0.85rem + 25% ≈ 1.05rem */
    .log-item { background: white; padding: 18px; border-radius: 12px; box-shadow: 0 5px 18px rgba(0,0,0,0.3); word-break: break-all; font-family: monospace; font-size: 1.05rem; color: #333; width: 100%; box-sizing: border-box; }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 2000; }
    /* Нумпад: 320px + 25% = 400px */
    .numpad-container { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; }
    .numpad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 18px 0; }
    .num-btn, .user-btn { padding: 18px; font-size: 1.6rem; background: #f0f0f0; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
    .user-btn { font-size: 1.4rem; width: 100%; margin-bottom: 10px; background: #e3f2fd; }
    .btn-add { width: 100%; padding: 22px; background: #4caf50; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 1.4rem; }
    #numpad-display { font-size: 3.1rem; font-weight: bold; margin: 12px 0; color: #3f51b5; text-align: center; border-bottom: 2.5px solid #eee; }
    .hidden { display: none !important; }
</style>





</head>
<body>

  <header class="header">
    <button class="btn-icon" onclick="window.location.href='index.html'">←</button>
    <h2><div id="indicator" class="net-indicator"></div> QR_012</h2>
    <button id="sync-btn" class="btn-icon" title="Синхронизация" onclick="syncFromGoogle()">☁</button>
    <button id="start-camera" onclick="startScanner()">Найти QR</button>
  </header>

  <main class="content">
    <div class="camera-preview"><video id="video" autoplay playsinline></video></div>
    <div id="result">Список пуст</div>
  </main>

  <div id="modal" class="modal-overlay hidden">
    <div class="numpad-container" id="numpad-view">
      <h3 style="text-align:center;margin:0">Количество:</h3>
      <div id="numpad-display">0</div>
      <div class="numpad-grid">
        <button class="num-btn" onclick="pressNum(1)">1</button><button class="num-btn" onclick="pressNum(2)">2</button><button class="num-btn" onclick="pressNum(3)">3</button>
        <button class="num-btn" onclick="pressNum(4)">4</button><button class="num-btn" onclick="pressNum(5)">5</button><button class="num-btn" onclick="pressNum(6)">6</button>
        <button class="num-btn" onclick="pressNum(7)">7</button><button class="num-btn" onclick="pressNum(8)">8</button><button class="num-btn" onclick="pressNum(9)">9</button>
        <button class="num-btn" onclick="pressNum(0)">0</button><button class="num-btn" style="grid-column:span 2;background:#ffccbc" onclick="pressNum('C')">СБРОС</button>
      </div>
      <button class="user-btn" style="background:#3f51b5;color:white" onclick="openUserMenu()">КОМУ: <span id="who-label">...</span></button>
      <button id="add-btn" class="btn-add" onclick="saveEntry()">ДОБАВИТЬ 0</button>
      <button class="user-btn" style="background:#f44336;color:white;margin-top:10px" onclick="closeModal()">ОТМЕНА</button>
    </div>
    <div class="numpad-container hidden" id="user-view">
      <button class="btn-icon" style="color:black;font-weight:bold" onclick="closeUserMenu()">← НАЗАД</button>
      <div style="max-height:300px;overflow-y:auto">
        <button class="user-btn" onclick="selectUser('Головин')">Головин</button>
        <button class="user-btn" onclick="selectUser('Иванов')">Иванов</button>
        <button class="user-btn" onclick="selectUser('Мытин')">Мытин</button>
        <button class="user-btn" onclick="selectUser('Погорелов')">Погорелов</button>
        <button class="user-btn" onclick="selectUser('Гуляев')">Гуляев</button>
        <button class="user-btn" onclick="selectUser('Бывальцев')">Бывальцев</button>
        <button class="user-btn" onclick="selectUser('Божков')">Божков</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwA_bvWI5beo46zIxMBINICG2lBnEc-kEHT0cGjsTECwCvXEzRzrEydNuy5Z87j_Hawyw/exec';
    const video = document.getElementById('video');
    const resultDiv = document.getElementById('result');
    const startBtn = document.getElementById('start-camera');
    const indicator = document.getElementById('indicator');
    const whoLabel = document.getElementById('who-label');
    const numDisplay = document.getElementById('numpad-display');
    const addBtn = document.getElementById('add-btn');

    let qrLogs = JSON.parse(localStorage.getItem('qr_db_v7')) || [];
    let stream = null, scanning = false, canvas = null, context = null;
    let currentQR = "", currentQty = "0", lastHash = "", currentUser = "Не указан";

    function renderLogs() {
      if (!qrLogs.length) { resultDiv.innerHTML = '<div class="log-title" style="text-align:center">Список пуст</div>'; return; }
      let html = '<div class="log-title">База данных:</div>';
      [...qrLogs].reverse().forEach(log => { html += `<div class="log-item">${log}</div>`; });
      resultDiv.innerHTML = html;
    }

    async function startScanner() {
      if (scanning) return;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
        scanning = true;
        startBtn.disabled = true;
        requestAnimationFrame(tick);
      } catch (e) { alert("Ошибка камеры"); }
    }

    function tick() {
      if (video.readyState === video.HAVE_ENOUGH_DATA && scanning) {
        if (!canvas) { canvas = document.createElement('canvas'); context = canvas.getContext('2d'); }
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);
        if (code) { currentQR = code.data; scanning = false; stream.getTracks().forEach(t => t.stop()); openModal(); return; }
      }
      if (scanning) requestAnimationFrame(tick);
    }

    function openModal() {
      currentQty = "0"; numDisplay.innerText = "0"; whoLabel.innerText = "Не указан"; currentUser = "Не указан";
      addBtn.innerText = "ДОБАВИТЬ 0";
      document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('modal').classList.add('hidden'); startBtn.disabled = false; scanning = false; }
    function openUserMenu() { document.getElementById('numpad-view').classList.add('hidden'); document.getElementById('user-view').classList.remove('hidden'); }
    function closeUserMenu() { document.getElementById('user-view').classList.add('hidden'); document.getElementById('numpad-view').classList.remove('hidden'); }
    function selectUser(name) { currentUser = name; whoLabel.innerText = name; closeUserMenu(); }

    function pressNum(n) {
      if (n === 'C') { currentQty = "0"; } 
      else { currentQty = (currentQty === "0") ? String(n) : currentQty + n; }
      numDisplay.innerText = currentQty;
      addBtn.innerText = "ДОБАВИТЬ " + currentQty;
    }

         async function saveEntry() {
      const now = new Date();
      // Рассчитываем номер (ID)
      const nextNum = qrLogs.length ? Math.max(...qrLogs.map(l => parseInt(l.split('/')[0]) || 0)) + 1 : 1;
      const time = now.getHours().toString().padStart(2,'0')+":"+now.getMinutes().toString().padStart(2,'0');
      const date = now.getDate().toString().padStart(2,'0')+"/"+(now.getMonth()+1).toString().padStart(2,'0')+"/"+now.getFullYear().toString().slice(-2);
      
      const entry = `${nextNum}/${currentQR}/${currentQty}/${currentUser}/${time}/${date}`;
      
      qrLogs.push(entry);
      localStorage.setItem('qr_db_v7', JSON.stringify(qrLogs));
      renderLogs(); 
      closeModal();

      // ОТПРАВКА
      if (navigator.onLine) {
        try {
          await fetch(SCRIPT_URL, { 
            method: 'POST', 
            mode: 'no-cors', 
            // Отправляем ВЕСЬ массив qrLogs, так как скрипт в таблице делает .map()
            body: JSON.stringify({ data: qrLogs }) 
          });
        } catch (e) {
          console.error("Ошибка отправки:", e);
        }
      }
    }



       async function syncFromGoogle() {
      if (!navigator.onLine) {
        alert("Нет интернета");
        return;
      }
      
      // Визуальный эффект: индикатор тускнеет во время загрузки
      indicator.style.opacity = "0.3"; 

      try {
        const response = await fetch(SCRIPT_URL);
        const data = await response.json();
        
        if (data && Array.isArray(data)) {
          qrLogs = data;
          localStorage.setItem('qr_db_v7', JSON.stringify(qrLogs));
          lastHash = JSON.stringify(data);
          renderLogs();
          console.log("Данные обновлены из облака");
        }
      } catch (e) { 
        console.error("Sync error:", e); 
        alert("Ошибка при получении данных из таблицы");
      } finally {
        indicator.style.opacity = "1";
      }
    }

    function updateStatus() { indicator.classList.toggle('net-online', navigator.onLine); }
    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);
    
    // Инициализация при запуске
    updateStatus();
    renderLogs();
    // syncFromGoogle() здесь НЕ вызываем, чтобы загрузка была только по кнопке
  </script>
</body>
</html>
