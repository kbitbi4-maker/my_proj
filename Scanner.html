<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  <title>QR_006</title>
  <style>
    html, body { height: 100%; margin: 0; padding: 0; font-family: sans-serif; overscroll-behavior-y: none; touch-action: pan-x pan-y; }
    body { display: flex; flex-direction: column; background: #f5f5f5; }
    
    .header { display: flex; align-items: center; padding: 10px 15px; background: #3f51b5; color: white; position: sticky; top: 0; z-index: 1000; }
    .header h2 { margin: 0; font-size: 1.1rem; flex-grow: 1; text-align: center; }
    
    .btn-icon { background: transparent; border: none; color: white; font-size: 1.5rem; cursor: pointer; padding: 5px; }
    #toggle-camera { font-size: 0.75rem; border: 1px solid white; border-radius: 6px; padding: 6px 10px; text-transform: uppercase; font-weight: bold; }
    
    .content { padding: 20px; display: flex; flex-direction: column; align-items: center; flex-grow: 1; overflow-y: auto; }
    .camera-preview { width: 100%; max-width: 400px; height: 300px; background: #000; border-radius: 12px; overflow: hidden; position: relative; margin-bottom: 15px; border: 2px solid #ccc; flex-shrink: 0; }
    video { width: 100%; height: 100%; object-fit: cover; }
    
    #result { width: 100%; max-width: 400px; padding: 15px; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: left; white-space: pre-wrap; margin-bottom: 100px; }
    .status { margin: 10px 0; padding: 10px; border-radius: 6px; width: 100%; max-width: 400px; font-size: 0.9rem; box-sizing: border-box; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .hidden { display: none !important; }

    /* Стили цифрового табло (Модальное окно) */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
    .numpad-container { background: white; padding: 20px; border-radius: 15px; width: 100%; max-width: 300px; text-align: center; }
    .numpad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
    .num-btn { padding: 15px; font-size: 1.5rem; background: #eee; border: none; border-radius: 8px; cursor: pointer; }
    .num-btn:active { background: #ddd; }
    .action-btn { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .btn-add { background: #4caf50; color: white; font-size: 1.1rem; }
    .btn-cancel { background: #f44336; color: white; }
    #numpad-display { font-size: 2rem; font-weight: bold; margin-bottom: 10px; color: #3f51b5; min-height: 2.4rem; }
  </style>
</head>
<body>

  <header class="header">
    <button class="btn-icon" onclick="location.reload()">←</button>
    <h2>QR_006</h2>
    <button id="toggle-camera">ВКЛЮЧИТЬ</button>
  </header>

  <main class="content">
    <div id="camera-container" class="camera-preview hidden">
      <video id="video" autoplay playsinline></video>
    </div>
    <div id="status" class="status hidden"></div>
    <div id="result">Список пуст</div>
  </main>

  <!-- Модальное табло -->
  <div id="modal" class="modal-overlay hidden">
    <div class="numpad-container">
      <h3>Сколько ед.товара добавить?</h3>
      <div id="numpad-display">0</div>
      <div class="numpad-grid">
        <button class="num-btn" onclick="pressNum(1)">1</button>
        <button class="num-btn" onclick="pressNum(2)">2</button>
        <button class="num-btn" onclick="pressNum(3)">3</button>
        <button class="num-btn" onclick="pressNum(4)">4</button>
        <button class="num-btn" onclick="pressNum(5)">5</button>
        <button class="num-btn" onclick="pressNum(6)">6</button>
        <button class="num-btn" onclick="pressNum(7)">7</button>
        <button class="num-btn" onclick="pressNum(8)">8</button>
        <button class="num-btn" onclick="pressNum(9)">9</button>
        <button class="num-btn" onclick="pressNum(0)">0</button>
        <button class="num-btn" onclick="pressNum('C')" style="grid-column: span 2; background: #ffccbc;">Сброс</button>
      </div>
      <button id="add-btn" class="action-btn btn-add">ДОБАВИТЬ 0</button>
      <button id="cancel-btn" class="action-btn btn-cancel">ОТМЕНА</button>
    </div>
  </div>

  <script src="https://unpkg.com"></script>
  <script>
    const video = document.getElementById('video');
    const toggleBtn = document.getElementById('toggle-camera');
    const cameraContainer = document.getElementById('camera-container');
    const status = document.getElementById('status');
    const resultDiv = document.getElementById('result');
    const modal = document.getElementById('modal');
    const numDisplay = document.getElementById('numpad-display');
    const addBtn = document.getElementById('add-btn');

    let stream = null;
    let scanning = false;
    let canvas = null;
    let context = null;
    
    let currentQR = "";
    let currentQty = "0";
    
    // Загрузка из ЛС при старте
    let qrLogs = JSON.parse(localStorage.getItem('qr_db_v6')) || [];
    renderLogs();

    toggleBtn.addEventListener('click', async () => {
      if (!scanning) startCamera();
      else stopCamera();
    });

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = stream;
        cameraContainer.classList.remove('hidden');
        status.classList.remove('hidden');
        toggleBtn.innerText = "СТОП";
        video.onloadedmetadata = () => {
          canvas = document.createElement('canvas');
          context = canvas.getContext('2d');
          scanning = true;
          showStatus('Ищу QR...', 'success');
          scanQR();
        };
      } catch (err) { showStatus('Ошибка: ' + err.message, 'error'); }
    }

    function stopCamera() {
      scanning = false;
      if (stream) stream.getTracks().forEach(t => t.stop());
      cameraContainer.classList.add('hidden');
      toggleBtn.innerText = "ВКЛЮЧИТЬ";
    }

    async function scanQR() {
      if (!scanning) return;
      if (video.videoWidth > 0) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        const code = jsQR(context.getImageData(0,0,canvas.width,canvas.height).data, canvas.width, canvas.height);
        
        if (code) {
          currentQR = code.data;
          stopCamera(); // Пауза камеры для ввода данных
          openModal();
          return; // Выходим из цикла сканирования
        }
      }
      setTimeout(scanQR, 100);
    }

    // Логика Табло
    function openModal() {
      currentQty = "0";
      updateNumUI();
      modal.classList.remove('hidden');
    }

    function pressNum(n) {
      if (n === 'C') currentQty = "0";
      else {
        if (currentQty === "0") currentQty = n.toString();
        else if (currentQty.length < 5) currentQty += n.toString();
      }
      updateNumUI();
    }

    function updateNumUI() {
      numDisplay.innerText = currentQty;
      addBtn.innerText = `ДОБАВИТЬ ${currentQty}`;
    }

    document.getElementById('cancel-btn').addEventListener('click', () => {
      modal.classList.add('hidden');
      startCamera(); // Возвращаемся к сканеру
    });

    addBtn.addEventListener('click', () => {
      const entry = `${qrLogs.length + 1}. "${currentQR}" "${currentQty}"`;
      qrLogs.push(entry);
      localStorage.setItem('qr_db_v6', JSON.stringify(qrLogs));
      renderLogs();
      modal.classList.add('hidden');
      showStatus(`Добавлено: ${currentQty} шт.`, 'success');
      startCamera(); // Продолжаем работу
    });

    function renderLogs() {
      if (qrLogs.length === 0) {
        resultDiv.innerText = "Список пуст";
        return;
      }
      resultDiv.innerHTML = "<strong>История (ЛС):</strong>\n" + qrLogs.join('\n');
    }

    function showStatus(msg, type) {
      status.textContent = msg;
      status.className = `status ${type}`;
    }
  </script>
</body>
</html>
