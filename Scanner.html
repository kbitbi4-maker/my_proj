<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Standalone QR Scanner</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .camera-preview { width: 100%; max-width: 400px; height: 300px; margin: 0 auto 16px; background: #000; border: 2px solid #ccc; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .btn-primary { padding: 15px 30px; background: #3f51b5; color: #fff; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>СКАНЕР (ВНЕШНИЙ)</h2>
    <div class="camera-preview">
        <video id="video" autoplay playsinline></video>
    </div>
    
    <button class="btn-primary" id="start-camera">ВКЛЮЧИТЬ КАМЕРУ</button>
    <p id="status"></p>

    <script>
        // ЗАМЕНИТЕ НА ВАШ URL ИЗ ГУГЛ АПП СКРИПТ (заканчивается на /exec)
        const SCRIPT_URL = 'https://google.com';
        
        const video = document.getElementById('video');
        const startBtn = document.getElementById('start-camera');
        const status = document.getElementById('status');

        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                video.srcObject = stream;
                status.innerText = "Камера работает. Отправка тестового сигнала...";
                
                // ТЕСТОВАЯ ОТПРАВКА В ТАБЛИЦУ
                sendToGas("Тест камеры: ОК");
                
            } catch (err) {
                alert("Ошибка доступа: " + err);
            }
        });

        async function sendToGas(data) {
            try {
                // Используем fetch с mode: 'no-cors' для обхода CORS ограничений Google
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    body: JSON.stringify({ qrData: data })
                });
                status.innerText = "Данные успешно отправлены в АС!";
            } catch (e) {
                status.innerText = "Ошибка отправки: " + e;
            }
        }
    </script>
</body>
</html>
