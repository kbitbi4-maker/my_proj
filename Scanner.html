<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  <title>QR_015_FIX</title>
  <style>
    html, body { height: 100%; margin: 0; padding: 0; font-family: sans-serif; overscroll-behavior-y: none; background: #f5f5f5; }
    .header { display: flex; align-items: center; padding: 10px 15px; background: #3f51b5; color: white; position: sticky; top: 0; z-index: 1000; height: 60px; box-sizing: border-box; }
    .header h2 { margin: 0; font-size: 1.1rem; flex-grow: 1; text-align: center; }
    .net-indicator { width: 12px; height: 12px; border-radius: 50%; background: #ff4b2b; border: 2px solid white; margin-right: 10px; }
    .net-online { background: #00e676; box-shadow: 0 0 8px #00e676; }
    .btn-icon { background: transparent; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
    #toggle-camera { font-size: 0.75rem; border: 1px solid white; border-radius: 6px; padding: 6px 10px; text-transform: uppercase; font-weight: bold; background: transparent; color: white; }
    
    .content { padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .camera-preview { width: 100%; max-width: 400px; height: 300px; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 15px; display: none; }
    video { width: 100%; height: 100%; object-fit: cover; }
    
    #result-list { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; }
    .log-item { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); word-break: break-all; font-family: monospace; font-size: 0.85rem; border: 2px solid transparent; }
    /* Стиль выделения */
    .log-item.selected { border-color: #ff4b2b; background: #fff5f5; }
    
    #del-btn { background: #ff4b2b; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; display: none; margin-right: 10px; cursor: pointer; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <header class="header">
    <button class="btn-icon" onclick="location.reload()">←</button>
    <div id="indicator" class="net-indicator"></div>
    <button id="del-btn" onclick="deleteSelected()">УДАЛИТЬ</button>
    <h2>QR_015</h2>
    <button id="sync-cloud" class="btn-icon" onclick="syncFromGoogle()">☁</button>
    <button id="toggle-camera">Найти QR</button>
  </header>

  <main class="content">
    <div id="camera-box" class="camera-preview">
      <video id="video" autoplay playsinline></video>
    </div>
    <div id="result-list">Загрузка...</div>
  </main>

  <script src="https://unpkg.com"></script>
  <script>
    const SCRIPT_URL = 'https://google.com';
    const video = document.getElementById('video');
    const toggleBtn = document.getElementById('toggle-camera');
    const cameraBox = document.getElementById('camera-box');
    const resultList = document.getElementById('result-list');
    const delBtn = document.getElementById('del-btn');
    const syncCloud = document.getElementById('sync-cloud');
    const indicator = document.getElementById('indicator');

    let qrLogs = JSON.parse(localStorage.getItem('qr_db_v7')) || [];
    let selectedIndices = new Set();
    let stream = null;
    let scanning = false;
    let canvas = document.createElement('canvas');
    let context = canvas.getContext('2d');

    // Отрисовка списка
    function render() {
      if (qrLogs.length === 0) {
        resultList.innerHTML = '<p style="text-align:center">Список пуст</p>';
        updateDelUI();
        return;
      }
      let html = '';
      [...qrLogs].reverse().forEach((log, index) => {
        const realIdx = qrLogs.length - 1 - index;
        const selClass = selectedIndices.has(realIdx) ? 'selected' : '';
        html += `<div class="log-item ${selClass}" onclick="toggleSelect(${realIdx})">${log}</div>`;
      });
      resultList.innerHTML = html;
      updateDelUI();
    }

    function toggleSelect(idx) {
      if (selectedIndices.has(idx)) selectedIndices.delete(idx);
      else selectedIndices.add(idx);
      render();
    }

    function updateDelUI() {
      if (selectedIndices.size > 0) {
        delBtn.style.display = 'block';
        delBtn.innerText = `УДАЛИТЬ (${selectedIndices.size})`;
        syncCloud.style.display = 'none';
      } else {
        delBtn.style.display = 'none';
        syncCloud.style.display = 'block';
      }
    }

    // Удаление из ЛС и АС
    async function deleteSelected() {
      if (!confirm("Удалить выбранные записи?")) return;
      
      const itemsToDelete = Array.from(selectedIndices).map(i => qrLogs[i]);
      
      // Удаляем локально
      qrLogs = qrLogs.filter((_, i) => !selectedIndices.has(i));
      localStorage.setItem('qr_db_v7', JSON.stringify(qrLogs));
      selectedIndices.clear();
      render();

      // Удаляем из таблицы (если онлайн)
      try {
        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify({ action: 'delete', items: itemsToDelete })
        });
      } catch (e) { console.log("Удалено только локально"); }
    }

    // Синхронизация (подкачка)
    async function syncFromGoogle() {
      indicator.classList.remove('net-online');
      try {
        const res = await fetch(SCRIPT_URL);
        const data = await res.json();
        if (data && Array.isArray(data)) {
          qrLogs = data;
          localStorage.setItem('qr_db_v7', JSON.stringify(qrLogs));
          indicator.classList.add('net-online');
          render();
        }
      } catch (e) { console.error("Ошибка синхронизации"); }
    }

    // Логика камеры из твоего рабочего кода QR_004
    toggleBtn.addEventListener('click', async () => {
      if (!scanning) {
        try {
          stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
          video.srcObject = stream;
          cameraBox.style.display = 'block';
          toggleBtn.innerText = "СТОП";
          toggleBtn.style.background = "#f44336";
          scanning = true;
          scanQR();
        } catch (err) { alert("Камера недоступна"); }
      } else {
        stopScanning();
      }
    });

    function stopScanning() {
      scanning = false;
      if (stream) stream.getTracks().forEach(track => track.stop());
      video.srcObject = null;
      cameraBox.style.display = 'none';
      toggleBtn.innerText = "Найти QR";
      toggleBtn.style.background = "transparent";
    }

    function scanQR() {
      if (!scanning) return;
      if (video.videoWidth > 0) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        const code = jsQR(context.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height);
        if (code) {
          const entry = `${code.data} | ${new Date().toLocaleString()}`;
          saveEntry(entry);
          stopScanning();
          return;
        }
      }
      setTimeout(scanQR, 250); 
    }

    async function saveEntry(entry) {
      qrLogs.push(entry);
      localStorage.setItem('qr_db_v7', JSON.stringify(qrLogs));
      render();
      try {
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ data: entry }) });
      } catch (e) {}
    }

    // Старт
    render();
    syncFromGoogle();
    setInterval(() => { if(navigator.onLine) indicator.classList.add('net-online'); else indicator.classList.remove('net-online'); }, 2000);
  </script>
</body>
</html>
