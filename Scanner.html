<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  <title>QR Scanner</title>
  <!-- Подключаем стили -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <button class="btn-icon" onclick="window.location.href='index.html'">←</button>
    <div id="indicator" class="net-indicator"></div>
    <button id="del-btn">УДАЛИТЬ</button>
    <h2>QR_015</h2>
    <button id="sync-btn" class="btn-icon">☁</button>
    <button id="start-camera">Найти QR</button>
  </header>

  <main class="content">
    <div id="camera-box" class="camera-preview">
      <video id="video" autoplay playsinline></video>
    </div>
    <div id="result-list">Загрузка данных...</div>
  </main>

  <!-- Библиотека и логика -->
  <script src="https://unpkg.com"></script>
  <script src="script.js"></script>
</body>
</html>
