<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>QR Scanner</title>
    <!-- Подключаем библиотеку сканирования -->
    <script src="https://unpkg.com"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        #reader { 
            width: 100%; max-width: 400px; 
            margin: 20px auto; background: #000; 
            border-radius: 15px; overflow: hidden; 
        }
        .btn-start { 
            padding: 20px 40px; background: #34a853; color: white; 
            border: none; border-radius: 50px; cursor: pointer; 
            font-weight: bold; font-size: 1.1rem; 
        }
        #result { margin-top: 20px; font-weight: bold; color: #075e54; font-size: 1.2rem; display: none; }
        .btn-back { display: block; margin-top: 30px; color: #666; text-decoration: none; }
    </style>
</head>
<body>

    <h2>СКАНЕР СКЛАДА</h2>
    
    <!-- Поле для камеры (библиотека сама создаст тут видео) -->
    <div id="reader"></div>
    
    <div id="result">Считано: <span id="res-text"></span></div>

    <button class="btn-start" id="start-btn" onclick="startScanning()">ВКЛЮЧИТЬ СКАНЕР</button>

    <a href="index.html" class="btn-back">← Вернуться в меню</a>

    <script>
        let html5QrCode;

        function startScanning() {
            document.getElementById('start-btn').style.display = 'none';
            
            // Создаем объект сканера
            html5QrCode = new Html5Qrcode("reader");

            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            html5QrCode.start(
                { facingMode: "environment" }, 
                config,
                (decodedText) => {
                    // ЕСЛИ КОД СЧИТАН
                    document.getElementById('result').style.display = 'block';
                    document.getElementById('res-text').innerText = decodedText;
                    
                    // Вибрация телефона (если поддерживается)
                    if (navigator.vibrate) navigator.vibrate(100);

                    // Останавливаем камеру после успеха (опционально)
                    html5QrCode.stop();
                    alert("Код считан: " + decodedText);
                }
            ).catch(err => {
                alert("Ошибка: " + err);
                document.getElementById('start-btn').style.display = 'inline-block';
            });
        }
    </script>
</body>
</html>
