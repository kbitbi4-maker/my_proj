<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  <title>QR_008</title>
  <style>
    /* Ваши стили без изменений */
    html, body { height: 100%; margin: 0; padding: 0; font-family: sans-serif; overscroll-behavior-y: none; touch-action: pan-x pan-y; }
    body { display: flex; flex-direction: column; background: url('fon_s.jpg') no-repeat center center fixed; background-size: cover; background-color: #f0f0f0; }
    .header { display: flex; align-items: center; padding: 10px 15px; background: #3f51b5; color: white; position: sticky; top: 0; z-index: 1000; height: 60px; box-sizing: border-box; gap: 10px; }
    .header h2 { margin: 0; font-size: 1.1rem; flex-grow: 1; text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .net-indicator { width: 12px; height: 12px; border-radius: 50%; background: #ff4b2b; border: 2px solid white; transition: 0.3s; flex-shrink: 0; }
    .net-online { background: #00e676; box-shadow: 0 0 8px #00e676; }
    .btn-icon { background: transparent; border: none; color: white; font-size: 1.5rem; cursor: pointer; padding: 5px; display: flex; align-items: center; }
    #start-camera { font-size: 0.75rem; border: 1px solid white; border-radius: 6px; padding: 6px 10px; text-transform: uppercase; font-weight: bold; background: transparent; color: white; cursor: pointer; }
    .content { padding: 20px; display: flex; flex-direction: column; align-items: center; flex-grow: 1; overflow-y: auto; }
    .camera-preview { width: 100%; max-width: 400px; height: 300px; background: #000; border-radius: 12px; overflow: hidden; position: relative; margin-bottom: 15px; border: 2px solid #ccc; flex-shrink: 0; }
    video { width: 100%; height: 100%; object-fit: cover; }
    #result { width: 100%; max-width: 400px; padding: 15px; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: left; white-space: pre-wrap; font-size: 0.85rem; font-family: monospace; }
    .status { margin: 10px 0; padding: 10px; border-radius: 6px; width: 100%; max-width: 400px; font-size: 0.8rem; box-sizing: border-box; text-align: center; font-weight: bold; }
    .success { background: #ffffff; color: #155724; border-left: 5px solid #00e676; }
    .error { background: #ffffff; color: #721c24; border-left: 5px solid #ff4b2b; }
    .hidden { display: none !important; }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 2000; }
    .numpad-container { background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 320px; }
    .numpad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
    .num-btn, .user-btn { padding: 15px; font-size: 1.3rem; background: #f0f0f0; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .user-btn { font-size: 1.1rem; width: 100%; margin-bottom: 8px; background: #e3f2fd; }
    .btn-add { width: 100%; padding: 18px; background: #4caf50; color: white; border: none; border-radius: 8px; font-weight: bold; margin-bottom: 10px; font-size: 1.1rem; }
    .btn-sub { width: 100%; padding: 12px; background: #3f51b5; color: white; border: none; border-radius: 8px; font-weight: bold; margin-bottom: 10px; }
    .btn-cancel { width: 100%; padding: 12px; background: #f44336; color: white; border: none; border-radius: 8px; font-weight: bold; }
    #numpad-display { font-size: 2.5rem; font-weight: bold; margin: 10px 0; color: #3f51b5; text-align: center; border-bottom: 2px solid #eee; }
  </style>
</head>
<body>

  <header class="header">
    <button class="btn-icon" onclick="window.location.href='index.html'">←</button>
    <h2><div id="indicator" class="net-indicator"></div> QR_008</h2>
    <button id="sync-btn" class="btn-icon" onclick="syncData()">☁</button>
    <button id="start-camera" onclick="startScanning()">Найти QR</button>
  </header>

  <main class="content">
    <div class="camera-preview">
      <video id="video" autoplay playsinline></video>
    </div>
    <div id="status" class="status hidden"></div>
    <div id="result">Список пуст</div>
  </main>

  <!-- Модальное окно -->
  <div id="modal" class="modal-overlay hidden">
    <div class="numpad-container" id="numpad-view">
      <h3 style="margin:0; font-size: 1rem; text-align:center;">Количество товара:</h3>
      <div id="numpad-display">0</div>
      <div class="numpad-grid">
        <button class="num-btn" onclick="pressNum(1)">1</button>
        <button class="num-btn" onclick="pressNum(2)">2</button>
        <button class="num-btn" onclick="pressNum(3)">3</button>
        <button class="num-btn" onclick="pressNum(4)">4</button>
        <button class="num-btn" onclick="pressNum(5)">5</button>
        <button class="num-btn" onclick="pressNum(6)">6</button>
        <button class="num-btn" onclick="pressNum(7)">7</button>
        <button class="num-btn" onclick="pressNum(8)">8</button>
        <button class="num-btn" onclick="pressNum(9)">9</button>
        <button class="num-btn" onclick="pressNum(0)">0</button>
        <button class="num-btn" style="grid-column: span 2; background:#ffccbc;" onclick="pressNum('C')">СБРОС</button>
      </div>
      <button class="btn-sub" onclick="openUserMenu()">КОМУ ВЫДАНО: <span id="who-label">...</span></button>
      <button id="add-btn" class="btn-add" onclick="saveEntry()">ДОБАВИТЬ 0</button>
      <button class="btn-cancel" onclick="closeModal()">ОТМЕНА</button>
    </div>

    <div class="numpad-container hidden" id="user-view">
      <button class="btn-icon" style="color:black; font-size: 1rem; font-weight: bold;" onclick="closeUserMenu()">← НАЗАД</button>
      <h3 style="text-align:center; margin-top: 10px;">Выберите фамилию:</h3>
      <div style="max-height: 300px; overflow-y: auto; padding: 5px;">
        <button class="user-btn" onclick="selectUser('Головин')">Головин</button>
        <button class="user-btn" onclick="selectUser('Иванов')">Иванов</button>
        <button class="user-btn" onclick="selectUser('Мытин')">Мытин</button>
        <button class="user-btn" onclick="selectUser('Погорелов')">Погорелов</button>
        <button class="user-btn" onclick="selectUser('Гуляев')">Гуляев</button>
        <button class="user-btn" onclick="selectUser('Бывальцев')">Бывальцев</button>
        <button class="user-btn" onclick="selectUser('Божков')">Божков</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz3KF13nR_sLT4TJF-XduOX-W7XS4F40LUTXXeGToZLOKLj6y093TF3O4fcWTNg12hoRQ/exec';
    
    const video = document.getElementById('video');
    const resultDiv = document.getElementById('result');
    const modal = document.getElementById('modal');
    const statusDiv = document.getElementById('status');
    
    let qrLogs = JSON.parse(localStorage.getItem('qr_db_v7')) || [];
    let scanning = false;
    let currentQR = "", currentQty = "0", currentUser = "Не указан";

    function showStatus(msg, type) {
      statusDiv.textContent = msg;
      statusDiv.className = `status ${type}`;
      statusDiv.classList.remove('hidden');
      setTimeout(() => statusDiv.classList.add('hidden'), 3000);
    }

    // ЛОГИКА СКАНЕРА
    async function startScanning() {
      if (scanning) return;
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
        scanning = true;
        requestAnimationFrame(tick);
      } catch (err) {
        showStatus("Ошибка доступа к камере", "error");
      }
    }

    function tick() {
      if (video.readyState === video.HAVE_ENOUGH_DATA && scanning) {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imgData.data, imgData.width, imgData.height);

        if (code) {
          currentQR = code.data;
          stopCamera();
          openModal();
          return;
        }
      }
      if (scanning) requestAnimationFrame(tick);
    }

    function stopCamera() {
      scanning = false;
      if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
      }
    }

    // НУМПАД И МОДАЛКА
    function openModal() {
      modal.classList.remove('hidden');
      currentQty = "0";
      updateDisplay();
    }

    function closeModal() {
      modal.classList.add('hidden');
      stopCamera();
    }

    function pressNum(n) {
      if (n === 'C') currentQty = "0";
      else currentQty = currentQty === "0" ? String(n) : currentQty + n;
      updateDisplay();
    }

    function updateDisplay() {
      document.getElementById('numpad-display').textContent = currentQty;
      document.getElementById('add-btn').textContent = `ДОБАВИТЬ ${currentQty}`;
    }

    function openUserMenu() {
      document.getElementById('numpad-view').classList.add('hidden');
      document.getElementById('user-view').classList.remove('hidden');
    }

    function closeUserMenu() {
      document.getElementById('user-view').classList.add('hidden');
      document.getElementById('numpad-view').classList.remove('hidden');
    }

    function selectUser(name) {
      currentUser = name;
      document.getElementById('who-label').textContent = name;
      closeUserMenu();
    }

    // СОХРАНЕНИЕ С НОВЫМИ ПОЛЯМИ
    function saveEntry() {
      const now = new Date();
      const entry = {
        qr: currentQR,           // 1 столбец
        qty: currentQty,         // 2 столбец
        user: currentUser,       // 3 столбец
        time: now.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'}), // 8 столбец
        day: now.getDate(),      // 9 столбец
        month: now.getMonth() + 1, // 11 столбец
        year: String(now.getFullYear()).slice(-2) // 12 столбец (формат 26)
      };

      qrLogs.push(entry);
      localStorage.setItem('qr_db_v7', JSON.stringify(qrLogs));
      renderLogs();
      closeModal();
      showStatus("Запись сохранена", "success");
    }

    function renderLogs() {
      if (qrLogs.length === 0) {
        resultDiv.innerHTML = "Список пуст";
        return;
      }
      resultDiv.innerHTML = qrLogs.map((e, i) => 
        `${i+1}. [${e.day}.${e.month}.${e.year} ${e.time}] ${e.qty} шт. - ${e.user}\nQR: ${e.qr}`
      ).reverse().join('\n\n---\n\n');
    }

    async function syncData() {
      if (qrLogs.length === 0) return showStatus("Нет данных для синхронизации", "error");
      
      showStatus("Синхронизация...", "success");
      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(qrLogs)
        });
        showStatus("Данные отправлены!", "success");
        // Если хотите очищать список после отправки, раскомментируйте:
        // qrLogs = []; localStorage.removeItem('qr_db_v7'); renderLogs();
      } catch (e) {
        showStatus("Ошибка сети", "error");
      }
    }

    window.onload = () => {
      renderLogs();
      if (navigator.onLine) document.getElementById('indicator').classList.add('net-online');
    };
  </script>
</body>
</html>
