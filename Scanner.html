<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>QR Scanner Minimal</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; }
    .camera-preview { width: 100%; maxwidth: 400px; height: 300px; margin: 0 auto 16px; background: #000; border: 2px solid #ccc; position: relative; overflow: hidden; }
    video { width: 100%; height: 100%; objectfit: cover; }
    .btn-primary { padding: 15px 30px; background: #3f51b5; color: #fff; border: none; cursor: pointer; borderradius: 8px; fontweight: bold; margin: 5px; }
    .btn-danger { background: #f44336; }
    #result { margintop: 20px; padding: 15px; background: #e3f2fd; borderleft: 4px solid #2196f3; textalign: left; whitespace: prewrap; }
    .status { margin: 10px 0; padding: 8px; borderradius: 4px; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>

  <h2>QR СКАНЕР (МИНИМАЛЬНЫЙ)</h2>

  <div class="camera-preview">
    <video id="video" autoplay playsinline></video>
  </div>

  <button class="btn-primary" id="start-camera">ВКЛЮЧИТЬ КАМЕРУ</button>
  <button class="btn-primary btn-danger" id="stop-camera" disabled>ВЫКЛЮЧИТЬ КАМЕРУ</button>

  <div id="status" class="status"></div>
  <div id="result">Результат сканирования появится здесь</div>

  <!-- Библиотека для сканирования QR‑кодов -->
  <script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
  <script>
    const video = document.getElementById('video');
    const startBtn = document.getElementById('start-camera');
    const stopBtn = document.getElementById('stop-camera');
    const status = document.getElementById('status');
    const resultDiv = document.getElementById('result');

    let stream = null;
    let scanning = false;
    let canvas = null;
    let context = null;

    function initCanvas() {
      canvas = document.createElement('canvas');
      context = canvas.getContext('2d');
    }

    startBtn.addEventListener('click', async () => {
      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          showStatus('Ваш браузер не поддерживает доступ к камере', 'error');
          return;
        }

        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' }
        });

        video.srcObject = stream;
        startBtn.disabled = true;
        stopBtn.disabled = false;
        showStatus('Камера активна. Наведите на QR‑код...', 'success');

        initCanvas();
        scanning = true;
        scanQR();
      } catch (err) {
        handleCameraError(err);
      }
    });

    stopBtn.addEventListener('click', () => {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        video.srcObject = null;
        startBtn.disabled = false;
        stopBtn.disabled = true;
        showStatus('Камера остановлена', 'success');
        scanning = false;
      }
    });

    async function scanQR() {
      if (!scanning || !stream) return;

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      context.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, imageData.width, imageData.height);

      if (code) {
        showResult(code.data);
        await sendToGas(code.data);
        scanning = false;
        stream.getTracks().forEach(track => track.stop());
        video.srcObject = null;
        startBtn.disabled = false;
        stopBtn.disabled = true;
      } else {
        setTimeout(scanQR, 100);
      }
    }

    function showStatus(message, type = 'success') {
      status.textContent = message;
      status.className = `status ${type}`;
    }

    function showResult(data) {
      resultDiv.innerHTML = `<strong>Найден QR‑код:</strong>\n${data}`;
    }

    function handleCameraError(error) {
      console.error('Ошибка камеры:', error);
      let message = `Ошибка: ${error.message}`;
      switch (error.name) {
        case 'NotAllowedError':
          message = 'Разрешите доступ к камере в настройках браузера';
          break;
        case 'NotFoundError':
          message = 'Камера не найдена';
          break;
        case 'OverconstrainedError':
          message = 'Не удалось найти камеру с нужным разрешением';
          break;
      }
      showStatus(message, 'error');
    }

    async function sendToGas(data) {
      try {
        const response = await fetch('https://script.google.com/macros/s/AKfycbz3KF13nR_sLT4TJF-XduOX-W7XS4F40LUTXXeGToZLOKLj6y093TF3O4fcWTNg12hoRQ/exec', {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify({ qrData: data })
        });
        showStatus('Данные успешно отправлены в Google Таблицу!', 'success');
      } catch (e) {
        showStatus(`Ошибка отправки: ${e.message}`, 'error');
      }
    }
  </script>
</body>
</html>
