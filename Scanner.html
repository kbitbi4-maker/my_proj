<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  <title>QR_015</title>
  <style>
    html, body { height: 100%; margin: 0; padding: 0; font-family: sans-serif; overscroll-behavior-y: none; touch-action: pan-x pan-y; }
    body { display: flex; flex-direction: column; background: url('fon_s.jpg') no-repeat center center fixed; background-size: cover; }
    .header { display: flex; align-items: center; padding: 10px 15px; background: #3f51b5; color: white; position: sticky; top: 0; z-index: 1000; height: 60px; box-sizing: border-box; gap: 10px; }
    .header h2 { margin: 0; font-size: 1.1rem; flex-grow: 1; text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .net-indicator { width: 12px; height: 12px; border-radius: 50%; background: #ff4b2b; border: 2px solid white; transition: 0.3s; flex-shrink: 0; }
    .net-online { background: #00e676; box-shadow: 0 0 8px #00e676; }
    .btn-icon { background: transparent; border: none; color: white; font-size: 1.5rem; cursor: pointer; padding: 5px; display: flex; align-items: center; }
    #start-camera { font-size: 0.75rem; border: 1px solid white; border-radius: 6px; padding: 6px 10px; text-transform: uppercase; font-weight: bold; background: transparent; color: white; cursor: pointer; transition: 0.3s; }
    .content { padding: 20px; display: flex; flex-direction: column; align-items: center; flex-grow: 1; overflow-y: auto; background: transparent; width: 100%; box-sizing: border-box; }
    .camera-preview { width: 100%; max-width: 400px; height: 300px; background: #000; border-radius: 12px; overflow: hidden; position: relative; margin-bottom: 15px; border: 2px solid #ccc; flex-shrink: 0; }
    video { width: 100%; height: 100%; object-fit: cover; }
    #result { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; }
    .log-title { color: white; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); font-size: 1.1rem; margin-bottom: 5px; width: 100%; }
    
    /* Твои стили логов + добавка для выделения */
    .log-item { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); word-break: break-all; font-family: monospace; font-size: 0.85rem; color: #333; width: 100%; box-sizing: border-box; border: 2px solid transparent; transition: 0.2s; }
    .log-item.selected { border-color: #ff4b2b; background: #fff5f5; }
    
    #del-btn { background: #ff4b2b; color: white; border: none; padding: 6px 10px; border-radius: 6px; font-weight: bold; font-size: 0.7rem; cursor: pointer; display: none; }

    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 2000; }
    .numpad-container { background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 320px; }
    .numpad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
    .num-btn { padding: 15px; font-size: 1.3rem; background: #f0f0f0; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .btn-control, .btn-add, .btn-cancel { width: 100%; padding: 18px; border-radius: 8px; font-weight: bold; font-size: 1.1rem; border: none; cursor: pointer; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; box-sizing: border-box; min-height: 60px; }
    .btn-control { background: #3f51b5; color: white; }
    .btn-add { background: #4caf50; color: white; }
    .btn-cancel { background: #f44336; color: white; margin-bottom: 0; }
    .user-btn { font-size: 1.1rem; width: 100%; margin-bottom: 8px; background: #e3f2fd; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    #numpad-display { font-size: 2.5rem; font-weight: bold; margin: 10px 0; color: #3f51b5; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <header class="header">
    <button class="btn-icon" onclick="window.location.href='index.html'">←</button>
    <h2><div id="indicator" class="net-indicator"></div> QR_015</h2>
    <button id="del-btn" onclick="deleteSelected()">УДАЛИТЬ</button>
    <button id="sync-btn" class="btn-icon" title="Синхронизация" onclick="syncFromGoogle()">☁</button>
    <button id="start-camera" onclick="toggleScanner()">Найти QR</button>
  </header>

  <main class="content">
    <div class="camera-preview"><video id="video" autoplay playsinline></video></div>
    <div id="result">Загрузка данных...</div>
  </main>

  <div id="modal" class="modal-overlay hidden">
    <div class="numpad-container" id="numpad-view">
      <h3 style="text-align:center;margin:0">Количество:</h3>
      <div id="numpad-display">0</div>
      <div class="numpad-grid">
        <button class="num-btn" onclick="pressNum(1)">1</button><button class="num-btn" onclick="pressNum(2)">2</button><button class="num-btn" onclick="pressNum(3)">3</button>
        <button class="num-btn" onclick="pressNum(4)">4</button><button class="num-btn" onclick="pressNum(5)">5</button><button class="num-btn" onclick="pressNum(6)">6</button>
        <button class="num-btn" onclick="pressNum(7)">7</button><button class="num-btn" onclick="pressNum(8)">8</button><button class="num-btn" onclick="pressNum(9)">9</button>
        <button class="num-btn" onclick="pressNum(0)">0</button><button class="num-btn" style="grid-column:span 2;background:#ffccbc" onclick="pressNum('C')">СБРОС</button>
      </div>
      <button class="btn-control" onclick="openUserMenu()">КОМУ: <span id="who-label">...</span></button>
      <button id="add-btn" class="btn-add" onclick="saveEntry()">ДОБАВИТЬ 0</button>
      <button class="btn-cancel" onclick="closeModal()">ОТМЕНА</button>
    </div>
    <div class="numpad-container hidden" id="user-view">
      <button class="btn-icon" style="color:black;font-weight:bold" onclick="closeUserMenu()">← НАЗАД</button>
      <div style="max-height:300px;overflow-y:auto">
        <button class="user-btn" onclick="selectUser('Головин')">Головин</button>
        <button class="user-btn" onclick="selectUser('Иванов')">Иванов</button>
        <button class="user-btn" onclick="selectUser('Мытин')">Мытин</button>
        <button class="user-btn" onclick="selectUser('Погорелов')">Погорелов</button>
        <button class="user-btn" onclick="selectUser('Гуляев')">Гуляев</button>
        <button class="user-btn" onclick="selectUser('Бывальцев')">Бывальцев</button>
        <button class="user-btn" onclick="selectUser('Божков')">Божков</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz3KF13nR_sLT4TJF-XduOX-W7XS4F40LUTXXeGToZLOKLj6y093TF3O4fcWTNg12hoRQ/exec';
    const video = document.getElementById('video');
    const resultDiv = document.getElementById('result');
    const startBtn = document.getElementById('start-camera');
    const indicator = document.getElementById('indicator');
    const whoLabel = document.getElementById('who-label');
    const numDisplay = document.getElementById('numpad-display');
    const addBtn = document.getElementById('add-btn');
    const syncBtn = document.getElementById('sync-btn');
    const delBtn = document.getElementById('del-btn');

    let qrLogs = JSON.parse(localStorage.getItem('qr_db_v7')) || [];
    let selectedSet = new Set();
    let stream = null, scanning = false, canvas = null, context = null;
    let currentQR = "", currentQty = "0", lastHash = "", currentUser = "Не указан";

    function renderLogs() {
      if (!qrLogs.length) { 
        resultDiv.innerHTML = '<div class="log-title" style="text-align:center">Список пуст</div>'; 
        toggleDelMode(false);
        return; 
      }
      let html = '<div class="log-title">База данных:</div>';
      [...qrLogs].reverse().forEach((log, index) => {
        const originalIndex = qrLogs.length - 1 - index;
        const isSelected = selectedSet.has(originalIndex) ? 'selected' : '';
        html += `<div class="log-item ${isSelected}" onclick="toggleSelect(${originalIndex})">${log}</div>`;
      });
      resultDiv.innerHTML = html;
      toggleDelMode(selectedSet.size > 0);
    }

    function toggleSelect(idx) {
      if (selectedSet.has(idx)) selectedSet.delete(idx);
      else selectedSet.add(idx);
      renderLogs();
    }

    function toggleDelMode(show) {
      delBtn.style.display = show ? 'block' : 'none';
      syncBtn.style.display = show ? 'none' : 'block';
    }

    async function deleteSelected() {
      if (!confirm(`Удалить выбранное (${selectedSet.size})?`)) return;
      const toDelete = Array.from(selectedSet).map(i => qrLogs[i]);
      qrLogs = qrLogs.filter((_, i) => !selectedSet.has(i));
      localStorage.setItem('qr_db_v7', JSON.stringify(qrLogs));
      selectedSet.clear();
      renderLogs();
      if (navigator.onLine) {
        try {
          await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'delete', items: toDelete }) });
        } catch (e) {}
      }
    }

    async function syncFromGoogle() {
      if (!navigator.onLine) return;
      try {
        indicator.classList.add('net-online');
        const response = await fetch(SCRIPT_URL);
        const data = await response.json();
        const dataString = JSON.stringify(data);
        if (data && (dataString !== lastHash || qrLogs.length === 0)) {
          qrLogs = data;
          localStorage.setItem('qr_db_v7', JSON.stringify(qrLogs));
          lastHash = dataString;
          renderLogs();
        }
      } catch (e) { indicator.classList.remove('net-online'); }
    }

    async function toggleScanner() {
      if (scanning) { stopCamera(); } else { startScanner(); }
    }

    async function startScanner() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
        scanning = true;
        startBtn.textContent = "ВЫКЛЮЧИТЬ";
        startBtn.style.background = "#f44336";
        requestAnimationFrame(tick);
      } catch (e) { alert("Ошибка камеры"); }
    }

    function stopCamera() {
      if (stream) stream.getTracks().forEach(t => t.stop());
      scanning = false;
      startBtn.textContent = "Найти QR";
      startBtn.style.background = "transparent";
    }

    function tick() {
      if (video.readyState === video.HAVE_ENOUGH_DATA && scanning) {
        if (!canvas) { canvas = document.createElement('canvas'); context = canvas.getContext('2d'); }
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        const code = jsQR(context.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height);
        if (code && code.data) { currentQR = code.data; stopCamera(); openModal(); return; }
      }
      if (scanning) requestAnimationFrame(tick);
    }

    function openModal() { currentQty = "0"; numDisplay.innerText = "0"; addBtn.innerText = "ДОБАВИТЬ 0"; document.getElementById('modal').classList.remove('hidden'); }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    function pressNum(n) { if (n === 'C') currentQty = "0"; else currentQty = currentQty === "0" ? String(n) : currentQty + n; numDisplay.innerText = currentQty; addBtn.innerText = `ДОБАВИТЬ ${currentQty}`; }
    function openUserMenu() { document.getElementById('numpad-view').classList.add('hidden'); document.getElementById('user-view').classList.remove('hidden'); }
    function closeUserMenu() { document.getElementById('user-view').classList.add('hidden'); document.getElementById('numpad-view').classList.remove('hidden'); }
    function selectUser(name) { currentUser = name; whoLabel.innerText = name; closeUserMenu(); }

    async function saveEntry() {
      const entry = `${currentQR} | Кол-во: ${currentQty} | Кому: ${currentUser} | ${new Date().toLocaleString()}`;
      qrLogs.push(entry);
      localStorage.setItem('qr_db_v7', JSON.stringify(qrLogs));
      renderLogs();
      closeModal();
      if (navigator.onLine) {
        try { await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ data: entry }) }); } catch(e) {}
      }
    }

    function updateStatus() { 
      indicator.classList.toggle('net-online', navigator.onLine); 
      if(navigator.onLine) syncFromGoogle(); 
    }
    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);

    updateStatus();
    renderLogs();
    syncFromGoogle();
    setInterval(syncFromGoogle, 10000);
  </script>
</body>
</html>
