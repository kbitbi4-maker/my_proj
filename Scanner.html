<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  <title>QR_006</title>
  <style>
    /* Настройки интерфейса */
    html, body { height: 100%; margin: 0; padding: 0; font-family: sans-serif; overscroll-behavior-y: none; touch-action: pan-x pan-y; }
    body { display: flex; flex-direction: column; background: #f5f5f5; }
    
    .header { display: flex; align-items: center; padding: 10px 15px; background: #3f51b5; color: white; position: sticky; top: 0; z-index: 1000; height: 60px; box-sizing: border-box; }
    .header h2 { margin: 0; font-size: 1.1rem; flex-grow: 1; text-align: center; }
    .btn-icon { background: transparent; border: none; color: white; font-size: 1.5rem; cursor: pointer; padding: 5px; display: flex; align-items: center; }
    
    #start-camera { font-size: 0.75rem; border: 1px solid white; border-radius: 6px; padding: 6px 10px; text-transform: uppercase; font-weight: bold; background: transparent; color: white; cursor: pointer; }
    #start-camera:disabled { opacity: 0.5; }

    .content { padding: 20px; display: flex; flex-direction: column; align-items: center; flex-grow: 1; overflow-y: auto; }
    .camera-preview { width: 100%; max-width: 400px; height: 300px; background: #000; border-radius: 12px; overflow: hidden; position: relative; margin-bottom: 15px; border: 2px solid #ccc; flex-shrink: 0; }
    video { width: 100%; height: 100%; object-fit: cover; }
    
    #result { width: 100%; max-width: 400px; padding: 15px; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: left; white-space: pre-wrap; font-size: 0.9rem; }
    .status { margin: 10px 0; padding: 10px; border-radius: 6px; width: 100%; max-width: 400px; font-size: 0.8rem; box-sizing: border-box; min-height: 38px; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .hidden { display: none !important; }

    /* Табло */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 2000; }
    .numpad-container { background: white; padding: 15px; border-radius: 15px; width: 90%; max-width: 300px; }
    .numpad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 10px 0; }
    .num-btn { padding: 15px; font-size: 1.4rem; background: #eee; border: none; border-radius: 8px; cursor: pointer; }
    .num-btn:active { background: #ccc; }
    .btn-add { width: 100%; padding: 15px; background: #4caf50; color: white; border: none; border-radius: 8px; font-weight: bold; margin-bottom: 8px; cursor: pointer; }
    .btn-cancel { width: 100%; padding: 10px; background: #f44336; color: white; border: none; border-radius: 8px; cursor: pointer; }
    #numpad-display { font-size: 2rem; font-weight: bold; margin: 10px 0; color: #3f51b5; text-align: center; }
  </style>
</head>
<body>

  <header class="header">
    <button class="btn-icon" onclick="location.reload()">←</button>
    <h2>QR_006</h2>
    <button id="start-camera">Найти QR</button>
  </header>

  <main class="content">
    <div class="camera-preview">
      <video id="video" autoplay playsinline></video>
    </div>
    <div id="status" class="status"></div>
    <div id="result">Список пуст</div>
  </main>

  <div id="modal" class="modal-overlay hidden">
    <div class="numpad-container">
      <h3 style="margin:0; font-size: 1rem; text-align:center;">Сколько ед.товара добавить?</h3>
      <div id="numpad-display">0</div>
      <div class="numpad-grid">
        <button class="num-btn" onclick="pressNum(1)">1</button>
        <button class="num-btn" onclick="pressNum(2)">2</button>
        <button class="num-btn" onclick="pressNum(3)">3</button>
        <button class="num-btn" onclick="pressNum(4)">4</button>
        <button class="num-btn" onclick="pressNum(5)">5</button>
        <button class="num-btn" onclick="pressNum(6)">6</button>
        <button class="num-btn" onclick="pressNum(7)">7</button>
        <button class="num-btn" onclick="pressNum(8)">8</button>
        <button class="num-btn" onclick="pressNum(9)">9</button>
        <button class="num-btn" onclick="pressNum(0)">0</button>
        <button class="num-btn" style="grid-column: span 2; background:#ffccbc;" onclick="pressNum('C')">C</button>
      </div>
      <button id="add-btn" class="btn-add">ДОБАВИТЬ 0</button>
      <button id="cancel-btn" class="btn-cancel">ОТМЕНА</button>
    </div>
  </div>

  <script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
  <script>
    const video = document.getElementById('video');
    const startBtn = document.getElementById('start-camera');
    const status = document.getElementById('status');
    const resultDiv = document.getElementById('result');
    const modal = document.getElementById('modal');
    const numDisplay = document.getElementById('numpad-display');
    const addBtn = document.getElementById('add-btn');

    let stream = null;
    let scanning = false;
    let canvas = null;
    let context = null;
    
    let currentQR = "";
    let currentQty = "0";

    // Инициализация из LocalStorage
    let qrLogs = JSON.parse(localStorage.getItem('qr_db_v6')) || [];
    renderLogs();

    function initCanvas() {
      canvas = document.createElement('canvas');
      context = canvas.getContext('2d');
    }

    startBtn.addEventListener('click', async () => {
      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          showStatus('Браузер не поддерживает камеру', 'error');
          return;
        }
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = stream;
        startBtn.disabled = true;
        showStatus('Камера активна. Ищу QR...', 'success');

        video.onloadedmetadata = () => {
          initCanvas();
          scanning = true;
          scanQR();
        };
      } catch (err) { showStatus('Ошибка: ' + err.message, 'error'); }
    });

    async function scanQR() {
      if (!scanning || !stream) return;
      if (video.videoWidth === 0 || video.videoHeight === 0) {
        setTimeout(scanQR, 100);
        return;
      }

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      context.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imageData = context.getImageData(0, 0, canvas.width, canvas.height);

      try {
        const code = jsQR(imageData.data, imageData.width, imageData.height);
        if (code) {
          currentQR = code.data;
          // ПАУЗА сканирования и камеры для ввода количества
          scanning = false;
          stream.getTracks().forEach(t => t.stop());
          video.srcObject = null;
          startBtn.disabled = false;
          
          openModal();
        } else {
          setTimeout(scanQR, 100);
        }
      } catch (e) { setTimeout(scanQR, 100); }
    }

    // Логика табло
    function openModal() {
      currentQty = "0";
      updateNumUI();
      modal.classList.remove('hidden');
    }

    function pressNum(n) {
      if (n === 'C') currentQty = "0";
      else {
        if (currentQty === "0") currentQty = n.toString();
        else if (currentQty.length < 6) currentQty += n.toString();
      }
      updateNumUI();
    }

    function updateNumUI() {
      numDisplay.innerText = currentQty;
      addBtn.innerText = `ДОБАВИТЬ ${currentQty}`;
    }

    document.getElementById('cancel-btn').onclick = () => {
      modal.classList.add('hidden');
      showStatus('Отменено', 'error');
    };

    addBtn.onclick = () => {
      // Формат: 1. "расшифровка" "количество"
      const entry = `${qrLogs.length + 1}. "${currentQR}" "${currentQty}"`;
      qrLogs.push(entry);
      localStorage.setItem('qr_db_v6', JSON.stringify(qrLogs));
      renderLogs();
      modal.classList.add('hidden');
      showStatus(`Добавлено №${qrLogs.length}`, 'success');
    };

    function renderLogs() {
      if (qrLogs.length === 0) {
        resultDiv.innerText = "Список пуст";
      } else {
        resultDiv.innerHTML = "<strong>База (LocalStorage):</strong>\n" + qrLogs.join('\n');
      }
    }

    function showStatus(msg, type) {
      status.textContent = msg;
      status.className = `status ${type}`;
    }
  </script>
</body>
</html>
