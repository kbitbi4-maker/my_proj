<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">

  <title>QR_004</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      overscroll-behavior-y: none; /* Запрет pull-to-refresh */
    }

    body {
      display: flex;
      flex-direction: column;
      background: #f5f5f5;
      overflow-y: auto; /* Разрешен обычный скролл */
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 15px;
      background: #3f51b5;
      color: white;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .header h2 { margin: 0; font-size: 1.2rem; flex-grow: 1; text-align: center; }

    .btn-icon {
      background: transparent;
      border: none;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
    }

    #toggle-camera {
      font-size: 0.8rem;
      border: 1px solid white;
      border-radius: 6px;
      padding: 6px 12px;
      text-transform: uppercase;
    }

    .content { padding: 20px; display: flex; flex-direction: column; align-items: center; }

    .camera-preview { 
      width: 100%; max-width: 400px; height: 300px; 
      background: #000; border-radius: 12px; overflow: hidden; 
      position: relative; margin-bottom: 15px;
    }

    video { width: 100%; height: 100%; object-fit: cover; }

    #result { 
      width: 100%; max-width: 400px; padding: 15px; 
      background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: left; white-space: pre-wrap; box-sizing: border-box;
    }

    .status { margin: 10px 0; padding: 10px; border-radius: 6px; width: 100%; max-width: 400px; box-sizing: border-box; font-size: 0.9rem; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .hidden { display: none; }
  </style>
</head>
<body>

  <header class="header">
    <button class="btn-icon" onclick="location.reload()">←</button>
    <h2>QR_004</h2>
    <button id="toggle-camera" class="btn-icon">Найти QR</button>
  </header>

  <main class="content">
    <div id="camera-container" class="camera-preview hidden">
      <video id="video" autoplay playsinline></video>
    </div>

    <div id="status" class="status hidden"></div>
    <div id="result">Нажмите «Найти QR» для запуска сканера</div>
  </main>

  <script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
  <script>
    const video = document.getElementById('video');
    const toggleBtn = document.getElementById('toggle-camera');
    const cameraContainer = document.getElementById('camera-container');
    const status = document.getElementById('status');
    const resultDiv = document.getElementById('result');

    let stream = null;
    let scanning = false;
    let canvas = document.createElement('canvas');
    let context = canvas.getContext('2d');

    toggleBtn.addEventListener('click', async () => {
      if (!scanning) {
        startScanning();
      } else {
        stopScanning();
      }
    });

    async function startScanning() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' }
        });
        video.srcObject = stream;
        cameraContainer.classList.remove('hidden');
        status.classList.remove('hidden');
        toggleBtn.innerText = "Стоп";
        toggleBtn.style.background = "#f44336";
        
        video.onloadedmetadata = () => {
          scanning = true;
          showStatus('Сканирование активно...', 'success');
          scanQR(); // Запуск цикла
        };
      } catch (err) {
        showStatus('Ошибка камеры: ' + err.message, 'error');
      }
    }

    function stopScanning() {
      scanning = false;
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        video.srcObject = null;
      }
      cameraContainer.classList.add('hidden');
      toggleBtn.innerText = "Найти QR";
      toggleBtn.style.background = "transparent";
      showStatus('Камера остановлена', 'success');
    }

    function scanQR() {
      if (!scanning) return;

      if (video.videoWidth > 0 && video.videoHeight > 0) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);

        if (code) {
          showResult(code.data);
          sendToGas(code.data);
          // Если нужно сканировать только один раз - раскомментируйте stopScanning();
        }
      }
      // Возвращаем проверенный setTimeout для стабильности на мобильных
      setTimeout(scanQR, 250); 
    }

    function showStatus(message, type) {
      status.textContent = message;
      status.className = `status ${type}`;
    }

    function showResult(data) {
      resultDiv.innerHTML = `<strong>Результат:</strong><br>${data}`;
    }

    async function sendToGas(data) {
      try {
        await fetch('ВАШ_URL_ЗДЕСЬ', {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify({ qrData: data })
        });
        showStatus('Отправлено в таблицу!', 'success');
      } catch (e) {
        console.log('Ошибка GAS');
      }
    }
  </script>
</body>
</html>
