<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  <title>QR_005</title>
  <style>
    html, body { height: 100%; margin: 0; padding: 0; font-family: sans-serif; overscroll-behavior-y: none; touch-action: pan-x pan-y; }
    body { display: flex; flex-direction: column; background: #f5f5f5; overflow-y: auto; }
    
    .header { display: flex; align-items: center; padding: 10px 15px; background: #3f51b5; color: white; position: sticky; top: 0; z-index: 1000; }
    .header h2 { margin: 0; font-size: 1.1rem; flex-grow: 1; text-align: center; }
    
    .btn-icon { background: transparent; border: none; color: white; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; padding: 5px; }
    #toggle-camera { font-size: 0.75rem; border: 1px solid white; border-radius: 6px; padding: 6px 10px; text-transform: uppercase; font-weight: bold; }
    
    .content { padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .camera-preview { width: 100%; max-width: 400px; height: 300px; background: #000; border-radius: 12px; overflow: hidden; position: relative; margin-bottom: 15px; border: 2px solid #ccc; }
    video { width: 100%; height: 100%; object-fit: cover; }
    
    #result { width: 100%; max-width: 400px; padding: 15px; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: left; white-space: pre-wrap; box-sizing: border-box; }
    .status { margin: 10px 0; padding: 10px; border-radius: 6px; width: 100%; max-width: 400px; box-sizing: border-box; font-size: 0.9rem; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .hidden { display: none; }
  </style>
</head>
<body>

  <header class="header">
    <button class="btn-icon" onclick="location.reload()">←</button>
    <h2>QR_005</h2>
    <button id="save-db" class="btn-icon" title="Сохранить БД">📁</button>
    <button id="toggle-camera">ВКЛЮЧИТЬ</button>
  </header>

  <main class="content">
    <div id="camera-container" class="camera-preview hidden">
      <video id="video" autoplay playsinline></video>
    </div>
    <div id="status" class="status hidden"></div>
    <div id="result">Результат сканирования появится здесь</div>
  </main>

  <script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
  <script>
    const video = document.getElementById('video');
    const toggleBtn = document.getElementById('toggle-camera');
    const saveDbBtn = document.getElementById('save-db');
    const cameraContainer = document.getElementById('camera-container');
    const status = document.getElementById('status');
    const resultDiv = document.getElementById('result');

    let stream = null;
    let scanning = false;
    let canvas = null;
    let context = null;
    let qrLogs = []; // Наша БД в памяти

    // Логика кнопки переключателя
    toggleBtn.addEventListener('click', async () => {
      if (!scanning) {
        await startCamera();
      } else {
        stopCamera();
      }
    });

    // Функция сохранения файла БД
    saveDbBtn.addEventListener('click', () => {
      if (qrLogs.length === 0) return alert("База пуста");
      const blob = new Blob([qrLogs.join('\n')], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `QR_Database_${new Date().toLocaleDateString()}.txt`;
      a.click();
    });

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = stream;
        cameraContainer.classList.remove('hidden');
        status.classList.remove('hidden');
        toggleBtn.innerText = "СТОП";
        toggleBtn.style.background = "#f44336";
        toggleBtn.style.color = "white";

        video.onloadedmetadata = () => {
          canvas = document.createElement('canvas');
          context = canvas.getContext('2d');
          scanning = true;
          showStatus('Камера активна. Ищу QR...', 'success');
          scanQR();
        };
      } catch (err) {
        showStatus('Ошибка камеры: ' + err.message, 'error');
      }
    }

    function stopCamera() {
      scanning = false;
      if (stream) stream.getTracks().forEach(track => track.stop());
      video.srcObject = null;
      cameraContainer.classList.add('hidden');
      toggleBtn.innerText = "ВКЛЮЧИТЬ";
      toggleBtn.style.background = "transparent";
      showStatus('Камера остановлена', 'success');
    }

    async function scanQR() {
      if (!scanning || !stream) return;

      if (video.videoWidth === 0 || video.videoHeight === 0) {
        setTimeout(scanQR, 100);
        return;
      }

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      context.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imageData = context.getImageData(0, 0, canvas.width, canvas.height);

      try {
        const code = jsQR(imageData.data, imageData.width, imageData.height);
        if (code) {
          const timestamp = new Date().toLocaleString();
          const entry = `[${timestamp}] ${code.data}`;
          
          // Чтобы не частить с одинаковыми кодами подряд
          if (!qrLogs.includes(entry)) {
            qrLogs.push(entry);
            showResult(code.data);
            await sendToGas(code.data);
          }
          // Продолжаем сканирование после паузы
          setTimeout(scanQR, 1000); 
        } else {
          setTimeout(scanQR, 100);
        }
      } catch (error) {
        setTimeout(scanQR, 100);
      }
    }

    function showStatus(message, type) {
      status.textContent = message;
      status.className = `status ${type}`;
    }

    function showResult(data) {
      resultDiv.innerHTML = `<strong>Найдено (${qrLogs.length}):</strong>\n${data}`;
    }

    async function sendToGas(data) {
      try {
        await fetch('ВАШ_URL', {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify({ qrData: data })
        });
        showStatus('Данные в облаке!', 'success');
      } catch (e) {
        showStatus('Сохранено локально (офлайн)', 'success');
      }
    }
  </script>
</body>
</html>
