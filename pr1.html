<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Words Table v016</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Шапка */
        .header { position: fixed; top: 0; width: 100%; height: 60px; background: #075e54; color: white; padding: 0 15px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 1000; }
        .header a { text-decoration: none; color: white; font-weight: bold; font-size: 1.2rem; }

        /* Панель поиска */
        .control-panel { margin-top: 60px; padding: 10px; background: #fff; border-bottom: 1px solid #ddd; z-index: 900; }
        .search-box { width: 100%; padding: 10px 15px; border-radius: 8px; border: 1px solid #ccc; outline: none; font-size: 1rem; }

        /* Контейнер для таблицы с прокруткой */
        .table-wrapper { flex: 1; overflow: auto; background: white; margin: 5px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        table { width: 100%; border-collapse: collapse; min-width: 800px; /* Чтобы на мобильном был скролл вбок */ }
        
        /* Стили ячеек */
        th, td { padding: 12px 10px; border: 1px solid #eee; text-align: left; font-size: 0.95rem; }
        
        /* Зафиксированная шапка таблицы */
        thead th { 
            position: sticky; 
            top: 0; 
            background: #4285f4; 
            color: white; 
            z-index: 10; 
            border: none;
        }

        /* Зебра для строк */
        tbody tr:nth-child(even) { background: #f9f9f9; }
        tbody tr:hover { background: #f1f5ff; }

        .loading { text-align: center; padding: 50px; color: #666; }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html">‹ Меню</a>
    <span>Слова: db_set_002</span>
    <div style="width: 40px;"></div>
</div>

<div class="control-panel">
    <input type="text" id="search-input" class="search-box" placeholder="Поиск по всей таблице..." oninput="filterWords()">
</div>

<div class="table-wrapper" id="table-container">
    <div class="loading">Загрузка данных из Google...</div>
</div>

<script>
    const WORDS_URL = 'https://script.google.com';
    let allWordsData = [];

    async function loadWords() {
        try {
            const res = await fetch(WORDS_URL + '?t=' + Date.now());
            const data = await res.json();
            
            if (!data || data.length < 1) {
                document.getElementById('table-container').innerHTML = "<p style='padding:20px;'>Лист пуст.</p>";
                return;
            }

            allWordsData = data; // Сохраняем всё, включая заголовки
            renderTable(allWordsData);

        } catch (e) {
            document.getElementById('table-container').innerHTML = "<p style='padding:20px; color:red;'>Ошибка загрузки.</p>";
        }
    }

    function renderTable(dataRows) {
        if (dataRows.length === 0) return;

        let html = '<table><thead><tr>';
        // Заголовки (берем из первой строки ДБ)
        const headers = ["№", "Слово", "Транскрипция", "Перевод 1", "Перевод 2", "Перевод 3", "Перевод 4"]; 
        headers.forEach(h => html += `<th>${h}</th>`);
        html += '</tr></thead><tbody>';

        // Данные (пропускаем первую строку если там тоже заголовки)
        const startIdx = (dataRows[0][0] === "№" || isNaN(dataRows[0][0])) ? 1 : 0;

        for (let i = startIdx; i < dataRows.length; i++) {
            const row = dataRows[i];
            html += '<tr>';
            // Выводим 7 столбцов (0-6)
            for (let j = 0; j < 7; j++) {
                html += `<td>${row[j] || ''}</td>`;
            }
            html += '</tr>';
        }

        html += '</tbody></table>';
        document.getElementById('table-container').innerHTML = html;
    }

    function filterWords() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const headerRow = allWordsData[0];
        
        const filtered = allWordsData.slice(1).filter(row => {
            return row.some(cell => String(cell).toLowerCase().includes(query));
        });
        
        // Рендерим с сохранением заголовка
        renderTable([headerRow, ...filtered]);
    }

    loadWords();
</script>

</body>
</html>
