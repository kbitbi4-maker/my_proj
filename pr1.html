<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Words Table v020</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .header { position: fixed; top: 0; width: 100%; height: 60px; background: #075e54; color: white; padding: 0 15px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 1000; }
        .header a { text-decoration: none; color: white; font-weight: bold; }

        .control-panel { margin-top: 60px; padding: 10px; background: #fff; border-bottom: 1px solid #ddd; z-index: 900; }
        .search-box { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; outline: none; }

        .table-wrapper { flex: 1; overflow: auto; background: white; margin: 5px; border-radius: 8px; }
        
        /* Таблица с переносом текста */
        table { width: 100%; border-collapse: collapse; min-width: 600px; table-layout: fixed; }
        th, td { 
            padding: 10px; 
            border: 1px solid #eee; 
            text-align: left; 
            font-size: 0.85rem; 
            white-space: normal; /* Разрешить перенос */
            word-wrap: break-word; 
            vertical-align: top;
        }
        
        /* Ширина колонок */
        th:nth-child(1) { width: 35px; } /* № */
        th:nth-child(2) { width: 100px; } /* Слово */
        th:nth-child(3) { width: 90px; } /* Транскрипция */

        thead th { position: sticky; top: 0; background: #4285f4; color: white; z-index: 10; }
        tbody tr:nth-child(even) { background: #f9f9f9; }
        .status { text-align: center; padding: 20px; color: #888; }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html">‹ Меню</a>
    <span>DB: db_set_002</span>
    <div style="width: 40px;"></div>
</div>

<div class="control-panel">
    <input type="text" id="search-input" class="search-box" placeholder="Поиск по таблице..." oninput="filterData()">
</div>

<div class="table-wrapper" id="container">
    <div class="status" id="status-text">Загрузка...</div>
</div>

<script>
    const WORDS_URL = 'https://script.google.com';
    let cachedData = [];

    async function fetchData() {
        try {
            const res = await fetch(WORDS_URL + '?t=' + Date.now());
            const data = await res.json();
            if (!Array.isArray(data)) throw new Error();
            cachedData = data;
            render(cachedData);
        } catch (e) {
            document.getElementById('status-text').innerText = "Ошибка загрузки. Проверьте соединение.";
        }
    }

    function render(rows) {
        if (!rows.length) return;
        let html = '<table><thead><tr>';
        const h = ["№", "Слово", "Транскр.", "Пер. 1", "Пер. 2", "Пер. 3", "Пер. 4"];
        h.forEach(name => html += `<th>${name}</th>`);
        html += '</tr></thead><tbody>';

        // Пропускаем заголовок, если он есть в первой строке данных
        const start = (String(rows[0][0]).includes('№') || String(rows[0][1]).toLowerCase().includes('слово')) ? 1 : 0;

        for (let i = start; i < rows.length; i++) {
            if (!rows[i] || !rows[i].length) continue;
            html += '<tr>';
            for (let j = 0; j < 7; j++) {
                html += `<td>${rows[i][j] !== undefined ? rows[i][j] : ''}</td>`;
            }
            html += '</tr>';
        }
        html += '</tbody></table>';
        document.getElementById('container').innerHTML = html;
    }

    function filterData() {
        const q = document.getElementById('search-input').value.toLowerCase();
        const filtered = cachedData.filter((row, i) => {
            if (i === 0 && (String(row[0]).includes('№'))) return false;
            return row.some(c => String(c).toLowerCase().includes(q));
        });
        render(filtered);
    }

    fetchData();
</script>
</body>
</html>
