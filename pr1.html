<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Words Table v022</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { position: fixed; top: 0; width: 100%; height: 60px; background: #075e54; color: white; padding: 0 15px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 1000; }
        .header a { text-decoration: none; color: white; font-weight: bold; }
        .control-panel { margin-top: 60px; padding: 10px; background: #fff; border-bottom: 1px solid #ddd; z-index: 900; }
        .search-box { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; outline: none; font-size: 1rem; }
        .table-wrapper { flex: 1; overflow: auto; background: white; margin: 5px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; min-width: 650px; table-layout: fixed; }
        th, td { padding: 12px 8px; border: 1px solid #eee; text-align: left; font-size: 0.9rem; vertical-align: top; word-wrap: break-word; white-space: normal; }
        th:nth-child(1) { width: 45px; } 
        th:nth-child(2) { width: 120px; }
        thead th { position: sticky; top: 0; background: #4285f4; color: white; z-index: 10; border: none; }
        tbody tr:nth-child(even) { background: #f9f9f9; }
        .status-area { text-align: center; padding: 40px; color: #666; font-style: italic; }
    </style>
</head>
<body>

<div class="header">
    <a href="index.html">‹ Меню</a>
    <span>DB: db_set_002</span>
    <div style="width: 40px;"></div>
</div>

<div class="control-panel">
    <input type="text" id="search-input" class="search-box" placeholder="Поиск по таблице..." oninput="filterData()">
</div>

<div class="table-wrapper" id="main-container">
    <div class="status-area" id="status-text">Загрузка данных...</div>
</div>

<script>
    const WORDS_URL = 'https://script.google.com/macros/s/AKfycbw-Nsm19xk4Reka51OMVNNhEMhCSjE1FhEqcApNHSxRkuGmSE7SfY9ztKKj5UhHRWjQ/exec';
    let fullTableData = [];

    // Используем более надежный метод получения JSON
    async function fetchData() {
        const status = document.getElementById('status-text');
        try {
            // Добавляем параметр redirect для Google
            const response = await fetch(WORDS_URL + '?t=' + Date.now(), {
                method: 'GET',
                redirect: 'follow' 
            });
            
            const data = await response.json();
            
            if (data && data.length > 0) {
                fullTableData = data;
                renderTable(fullTableData);
            } else {
                status.innerHTML = "Лист пуст или не найден.";
            }
        } catch (e) {
            status.innerHTML = "Ошибка: " + e.message + "<br><small>Попробуйте открыть ссылку скрипта в новой вкладке. Если там ошибка - исправьте доступ в Google.</small>";
            console.error(e);
        }
    }

    function renderTable(rows) {
        if (!rows || rows.length === 0) return;
        let html = '<table><thead><tr>';
        const headers = ["№", "Слово", "Транскр.", "Пер. 1", "Пер. 2", "Пер. 3", "Пер. 4"];
        headers.forEach(h => html += `<th>${h}</th>`);
        html += '</tr></thead><tbody>';

        const firstRowStr = String(rows[0]).toLowerCase();
        const start = (firstRowStr.includes('слово') || firstRowStr.includes('№')) ? 1 : 0;

        for (let i = start; i < rows.length; i++) {
            const r = rows[i];
            if (!r || r.length === 0) continue;
            html += '<tr>';
            for (let j = 0; j < 7; j++) {
                html += `<td>${(r[j] !== undefined && r[j] !== null) ? r[j] : ''}</td>`;
            }
            html += '</tr>';
        }
        html += '</tbody></table>';
        document.getElementById('main-container').innerHTML = html;
    }

    function filterData() {
        const query = document.getElementById('search-input').value.toLowerCase();
        if (!query) { renderTable(fullTableData); return; }
        const filtered = fullTableData.filter((row, index) => {
            if (index === 0 && String(row).toLowerCase().includes('слово')) return false;
            return row.some(cell => String(cell).toLowerCase().includes(query));
        });
        renderTable(filtered);
    }

    fetchData();
</script>
</body>
</html>
