<!-- pr1.html ver028 -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Words Table v028</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { position: fixed; top: 0; width: 100%; height: 60px; background: #075e54; color: white; padding: 0 15px; display: flex; align-items: center; justify-content: space-between; z-index: 1000; }
        
        .control-panel { margin-top: 60px; padding: 10px; background: #fff; border-bottom: 1px solid #ddd; display: flex; gap: 10px; align-items: center; }
        .search-box { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ccc; outline: none; height: 40px; }
        
        /* Контейнер для кнопок справа от поиска */
        .buttons-group { display: flex; flex-direction: column; gap: 5px; }
        .btn-study, .btn-cards { border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100px; font-size: 0.8rem; }
        .btn-cards { background: #3498db; color: white; } /* Синий для карточек */
        .btn-study { background: #f39c12; color: white; } /* Оранжевый для изучения */
        
        .table-wrapper { flex: 1; overflow: auto; background: white; margin: 5px; border-radius: 8px; }
        table { width: 800px; border-collapse: collapse; table-layout: fixed; }
        th, td { padding: 10px 5px; border: 1px solid #eee; text-align: left; font-size: 0.85rem; vertical-align: top; white-space: normal; word-wrap: break-word; }
        
        /* Ширина колонок */
        th:nth-child(1), td:nth-child(1) { width: 20px; }
        th:nth-child(2), td:nth-child(2) { width: 70px; }
        th:nth-child(3), td:nth-child(3) { width: 70px; }
        th:nth-child(4), td:nth-child(4), th:nth-child(5), td:nth-child(5), th:nth-child(6), td:nth-child(6), th:nth-child(7), td:nth-child(7) { width: 135px; }
        th:nth-child(8), td:nth-child(8) { width: 100px; }

        thead th { position: sticky; top: 0; background: #4285f4; color: white; z-index: 10; }
        tr.selected { background-color: #d1e7dd !important; cursor: pointer; }
        tr.status-learning { background-color: #fff2cc; }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" style="color:white; text-decoration:none;">‹ Меню</a>
        <span>PR1 Table</span>
        <div style="width:40px;"></div>
    </div>

    <div class="control-panel">
        <input type="text" id="search-input" class="search-box" placeholder="Поиск..." oninput="filterData()">
        <div class="buttons-group">
            <button class="btn-cards" onclick="openCards()">Карточки</button>
            <button class="btn-study" id="study-btn" onclick="markAsLearning()">Изучить</button>
        </div>
    </div>

    <div class="table-wrapper" id="main-container">
        <div style="padding:20px;">Загрузка...</div>
    </div>

<script>
    const WORDS_URL = 'https://script.google.com/macros/s/AKfycbzUvswfQIF0RbfqDZtHLczTdC8NLWyxvPQ4WXSnoghoBwnivFjDVtrgtHYUt2GEOdMo/exec';
    let fullData = [];
    let selectedRowId = null;

    async function fetchData() {
        try {
            const response = await fetch(WORDS_URL + '?t=' + Date.now());
            fullData = await response.json();
            renderHTMLTable(fullData);
        } catch (e) { 
            document.getElementById('main-container').innerHTML = "Ошибка загрузки."; 
        }
    }

    function renderHTMLTable(rows) {
        let html = '<table><thead><tr><th>№</th><th>Word</th><th>Trans</th><th>P1</th><th>P2</th><th>P3</th><th>P4</th><th>Status</th></tr></thead><tbody>';
        // Проверка на наличие заголовков в данных
        const start = (rows.length > 0 && String(rows[0][0]).toLowerCase().includes('№')) ? 1 : 0;
        
        for (let i = start; i < rows.length; i++) {
            const r = rows[i];
            const isLearning = r[7] === 'на изучении';
            html += `<tr onclick="selectRow('${r[0]}', this)" class="${isLearning ? 'status-learning' : ''}">
                ${r.map((cell, idx) => idx < 8 ? `<td>${cell || ''}</td>` : '').join('')}
            </tr>`;
        }
        document.getElementById('main-container').innerHTML = html + '</tbody></table>';
    }

    function selectRow(id, el) {
        document.querySelectorAll('tr').forEach(tr => tr.classList.remove('selected'));
        el.classList.add('selected');
        selectedRowId = id;
    }

    // Новая функция для открытия карточек
    function openCards() {
        window.open('set_unlearn.html', '_blank');
    }

    async function markAsLearning() {
        if (!selectedRowId) return alert("Выберите строку!");
        const btn = document.getElementById('study-btn');
        const oldText = btn.innerText;
        btn.innerText = "⏳...";
        btn.disabled = true;

        try {
            await fetch(WORDS_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({ rowNum: selectedRowId }) 
            });
            fetchData(); // Обновляем таблицу после успеха
        } catch (e) {
            alert("Ошибка при сохранении");
        } finally {
            btn.innerText = oldText;
            btn.disabled = false;
        }
    }

    function filterData() {
        const q = document.getElementById('search-input').value.toLowerCase();
        // Фильтруем данные, оставляя заголовок если нужно (индекс 0)
        const filtered = fullData.filter((r, i) => i === 0 || r.some(c => String(c).toLowerCase().includes(q)));
        renderHTMLTable(filtered);
    }

    fetchData();
</script>
</body>
</html>
